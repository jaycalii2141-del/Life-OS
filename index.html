<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life OS — Jay Martinez</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg-0: #06060A;
  --bg-1: #0B0B12;
  --bg-2: #11111A;
  --text: #F5F5F7;
  --muted: #8A8A95;
  --dim: #5A5A66;
  --line: rgba(255, 255, 255, 0.06);
  --line-strong: rgba(255, 255, 255, 0.12);
  --glass: rgba(255, 255, 255, 0.035);

  --ona-red: #FF0033;
  --ona-blue: #0055FF;
  --cyan: #00D4FF;
  --violet: #B14CFF;
  --magenta: #FF3CC8;
  --lime: #B6FF3C;
  --gold: #FFD23C;
  --orange: #FF8A3C;

  --font-display: 'Bebas Neue', 'Helvetica Neue', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}

* { box-sizing: border-box; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: var(--text);
  font-family: var(--font-body);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#root {
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 800px 600px at 20% 10%, rgba(0, 85, 255, 0.06) 0%, transparent 60%),
    radial-gradient(ellipse 700px 500px at 80% 90%, rgba(177, 76, 255, 0.05) 0%, transparent 60%),
    #000;
  position: relative;
}

#root::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 80%);
}

.screen-host {
  position: absolute;
  inset: 0;
  background: var(--bg-0);
  overflow: hidden;
}

.screen-scroll {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-top: 56px;
  padding-bottom: 130px;
  -webkit-overflow-scrolling: touch;
}

.screen-content {
  padding: 0 16px;
  animation: screenIn 420ms cubic-bezier(0.2, 0.7, 0.2, 1);
}

@keyframes screenIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.display { font-family: var(--font-display); letter-spacing: 0.02em; }
.mono { font-family: var(--font-mono); }

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  font-weight: 500;
}

.section-title {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--muted);
}

.glass {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid var(--line);
  border-radius: 18px;
  position: relative;
}

.glass-strong {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--line-strong);
  border-radius: 20px;
  position: relative;
}

.hud { position: relative; }
.hud-tick {
  position: absolute;
  width: 10px;
  height: 10px;
  border-color: rgba(255, 255, 255, 0.25);
  border-style: solid;
  border-width: 0;
  pointer-events: none;
}
.hud-tick.tl { top: 7px; left: 7px; border-top-width: 1px; border-left-width: 1px; }
.hud-tick.tr { top: 7px; right: 7px; border-top-width: 1px; border-right-width: 1px; }
.hud-tick.bl { bottom: 7px; left: 7px; border-bottom-width: 1px; border-left-width: 1px; }
.hud-tick.br { bottom: 7px; right: 7px; border-bottom-width: 1px; border-right-width: 1px; }

.mesh-readiness {
  background:
    radial-gradient(ellipse 70% 80% at 15% 20%, rgba(0, 212, 255, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 90% 10%, rgba(177, 76, 255, 0.16) 0%, transparent 55%),
    radial-gradient(ellipse 80% 70% at 50% 100%, rgba(255, 0, 51, 0.14) 0%, transparent 55%),
    linear-gradient(140deg, #0B0B12 0%, #11111A 100%);
}
.mesh-train {
  background:
    radial-gradient(ellipse 65% 70% at 80% 20%, rgba(0, 212, 255, 0.22) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 20% 90%, rgba(182, 255, 60, 0.10) 0%, transparent 55%),
    linear-gradient(140deg, #0B0B12 0%, #11111A 100%);
}
.mesh-content {
  background:
    radial-gradient(ellipse 60% 70% at 20% 20%, rgba(255, 60, 200, 0.18) 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 90% 100%, rgba(255, 138, 60, 0.16) 0%, transparent 55%),
    linear-gradient(140deg, #0B0B12 0%, #11111A 100%);
}
.mesh-ona {
  background:
    radial-gradient(ellipse 70% 70% at 10% 0%, rgba(255, 0, 51, 0.20) 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 100% 100%, rgba(182, 255, 60, 0.10) 0%, transparent 55%),
    linear-gradient(140deg, #0B0B12 0%, #11111A 100%);
}
.mesh-ai {
  background:
    radial-gradient(ellipse 70% 70% at 50% 0%, rgba(177, 76, 255, 0.30) 0%, transparent 55%),
    radial-gradient(ellipse 70% 70% at 50% 100%, rgba(0, 212, 255, 0.20) 0%, transparent 55%),
    linear-gradient(140deg, #0B0B12 0%, #11111A 100%);
}

.glow-red    { box-shadow: 0 0 80px -16px rgba(255, 0, 51, 0.55), 0 0 0 1px rgba(255, 0, 51, 0.25) inset; }
.glow-cyan   { box-shadow: 0 0 70px -16px rgba(0, 212, 255, 0.45); }
.glow-violet { box-shadow: 0 0 70px -16px rgba(177, 76, 255, 0.45); }
.glow-lime   { box-shadow: 0 0 70px -16px rgba(182, 255, 60, 0.35); }
.glow-gold   { box-shadow: 0 0 60px -16px rgba(255, 210, 60, 0.40); }

.brand-jaymuvs    { background: linear-gradient(145deg, #FF0033 0%, #8a001b 100%); }
.brand-motionmob  { background: linear-gradient(145deg, #0055FF 0%, #002a8a 100%); }
.brand-ona-elite  { background: linear-gradient(145deg, #B6FF3C 0%, #5a8a1e 100%); color: #0B0B12; }
.brand-jk-acro    { background: linear-gradient(145deg, #B14CFF 0%, #5a2680 100%); }
.brand-acro-wooks { background: linear-gradient(145deg, #FF8A3C 0%, #8a4520 100%); }
.brand-ppp        { background: linear-gradient(145deg, #F5F5F7 0%, #8a8a95 100%); color: #0B0B12; }

@keyframes shimmer-cell {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.35); }
}
.shimmer-cell { animation: shimmer-cell 3.5s ease-in-out infinite; }

@keyframes pulse-node {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.6), 0 0 24px -4px rgba(0, 212, 255, 0.6);
  }
  50% {
    box-shadow: 0 0 0 8px rgba(0, 212, 255, 0), 0 0 32px -4px rgba(0, 212, 255, 0.8);
  }
}
.pulse-node { animation: pulse-node 2.2s ease-out infinite; }

@keyframes orb-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.orb-spin { animation: orb-spin 12s linear infinite; }

@keyframes orb-spin-fast { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
.orb-spin-fast { animation: orb-spin-fast 6s linear infinite; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.blink { animation: blink 1.6s ease-in-out infinite; }

@keyframes glow-pulse-red {
  0%, 100% { box-shadow: 0 0 60px -10px rgba(255,0,51,0.50), 0 0 0 1px rgba(255,0,51,0.25) inset; }
  50% { box-shadow: 0 0 90px -10px rgba(255,0,51,0.75), 0 0 0 1px rgba(255,0,51,0.45) inset; }
}
.glow-pulse-red { animation: glow-pulse-red 3.4s ease-in-out infinite; }

@keyframes fab-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4), 0 6px 24px rgba(0, 212, 255, 0.35); }
  50% { box-shadow: 0 0 0 8px rgba(0, 212, 255, 0), 0 6px 24px rgba(0, 212, 255, 0.5); }
}
.fab-glow { animation: fab-glow 2.6s ease-out infinite; }

.pressable {
  transition: transform 180ms cubic-bezier(0.2, 0.7, 0.2, 1),
              box-shadow 180ms cubic-bezier(0.2, 0.7, 0.2, 1),
              border-color 180ms;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.pressable:active { transform: scale(0.97); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 9px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border: 1px solid var(--line-strong);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  white-space: nowrap;
}
.pill-dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

.pill-red    { color: var(--ona-red);  border-color: rgba(255,0,51,0.35);   background: rgba(255,0,51,0.08); }
.pill-cyan   { color: var(--cyan);     border-color: rgba(0,212,255,0.35);  background: rgba(0,212,255,0.08); }
.pill-lime   { color: var(--lime);     border-color: rgba(182,255,60,0.35); background: rgba(182,255,60,0.08); }
.pill-violet { color: var(--violet);   border-color: rgba(177,76,255,0.35); background: rgba(177,76,255,0.08); }
.pill-gold   { color: var(--gold);     border-color: rgba(255,210,60,0.35); background: rgba(255,210,60,0.08); }
.pill-orange { color: var(--orange);   border-color: rgba(255,138,60,0.35); background: rgba(255,138,60,0.08); }
.pill-muted  { color: var(--muted); }

.bar-track {
  height: 4px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.06);
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--cyan);
  position: relative;
  transition: width 800ms cubic-bezier(0.2, 0.7, 0.2, 1);
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: bar-shine 2.4s ease-in-out infinite;
}
@keyframes bar-shine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.confetti-host {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 8px;
  height: 14px;
  border-radius: 2px;
  animation: confetti-burst 1100ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
}
@keyframes confetti-burst {
  0% { transform: translate(-50%, -50%) rotate(0deg) scale(0.6); opacity: 1; }
  100% {
    transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1);
    opacity: 0;
  }
}

.scrim {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 150;
  animation: scrimIn 240ms ease;
}
@keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 160;
  background: var(--bg-1);
  border-top: 1px solid var(--line-strong);
  border-radius: 28px 28px 0 0;
  padding: 14px 20px 32px;
  animation: sheetIn 380ms cubic-bezier(0.2, 0.7, 0.2, 1);
  box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
}
@keyframes sheetIn {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 36px;
  height: 4px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  margin: 0 auto 12px;
}

.t-muted { color: var(--muted); }
.t-dim { color: var(--dim); }

/* ─── The Self ──────────────────────────────────────────── */
@keyframes self-breathe {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}
.self-breathe { animation: self-breathe 4.5s ease-in-out infinite; }

@keyframes self-aura-pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.9; }
}
.self-aura-pulse { animation: self-aura-pulse 3.8s ease-in-out infinite; }

/* ─── XP Float ──────────────────────────────────────────── */
@keyframes xp-float-up {
  0%   { opacity: 0; transform: translateX(-50%) translateY(24px) scale(0.7); }
  18%  { opacity: 1; transform: translateX(-50%) translateY(0px)  scale(1.05); }
  65%  { opacity: 1; transform: translateX(-50%) translateY(-8px) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-44px) scale(0.9); }
}
.xp-float { animation: xp-float-up 1900ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }

/* ─── Presence Whisper ──────────────────────────────────── */
@keyframes presence-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.presence-in { animation: presence-in 500ms cubic-bezier(0.2,0.7,0.2,1) both; animation-delay: 800ms; }

/* ─── Command Spotlight ─────────────────────────────────── */
@keyframes spotlight-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.spotlight-up { animation: spotlight-up 280ms cubic-bezier(0.2,0.7,0.2,1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ios-frame -->
  <script type="text/babel">
function IOSStatusBar({ dark = false }) {
  const [time, setTime] = useState(() => {
    const n = new Date(); return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
  });
  useEffect(() => {
    const id = setInterval(() => {
      const n = new Date(); setTime(`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`);
    }, 15000);
    return () => clearInterval(id);
  }, []);
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{ fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590, fontSize: 17, lineHeight: '22px', color: c }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px' }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{ padding: '0 16px', fontFamily: '-apple-system, system-ui', fontSize: 34, fontWeight: 700, lineHeight: '41px', color: text, letterSpacing: 0.4 }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{ display: 'flex', alignItems: 'center', minHeight: 52, padding: '0 16px', position: 'relative', fontFamily: '-apple-system, system-ui', fontSize: 17, letterSpacing: -0.43 }}>
      {icon && <div style={{ width: 30, height: 30, borderRadius: 7, background: icon, marginRight: 12, flexShrink: 0 }} />}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>

  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

function HUDTicks() {
  return (
    <>
      <span className="hud-tick tl" />
      <span className="hud-tick tr" />
      <span className="hud-tick bl" />
      <span className="hud-tick br" />
    </>
  );
}

function TickCounter({ value, duration = 1100, format = (v) => v, style, className }) {
  const [display, setDisplay] = useState(0);
  const startRef = useRef(null);
  const rafRef = useRef(null);
  const targetRef = useRef(value);
  useEffect(() => {
    targetRef.current = value;
    startRef.current = null;
    const tick = (t) => {
      if (!startRef.current) startRef.current = t;
      const p = Math.min(1, (t - startRef.current) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(targetRef.current * eased);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);
  return <span className={className} style={style}>{format(display)}</span>;
}

function SectionHead({ eyebrow, title, trailing, style }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12, ...style }}>
      <div>
        {eyebrow && <div className="eyebrow" style={{ marginBottom: 6 }}>{eyebrow}</div>}
        {title && <div className="section-title">{title}</div>}
      </div>
      {trailing}
    </div>
  );
}

function ProgressBar({ value, color = 'var(--cyan)', height = 4, animated = true }) {
  const [w, setW] = useState(0);
  useEffect(() => { const t = setTimeout(() => setW(value), 50); return () => clearTimeout(t); }, [value]);
  return (
    <div className="bar-track" style={{ height }}>
      <div className="bar-fill" style={{ width: `${animated ? w : value}%`, background: color, boxShadow: `0 0 12px ${color}` }} />
    </div>
  );
}

function Pill({ children, variant = 'default', style, dot }) {
  const cls = ({ default: 'pill', red: 'pill pill-red', cyan: 'pill pill-cyan', lime: 'pill pill-lime', violet: 'pill pill-violet', gold: 'pill pill-gold', orange: 'pill pill-orange', muted: 'pill pill-muted' })[variant] || 'pill';
  return (
    <span className={cls} style={style}>
      {dot && <span className="pill-dot" style={{ background: dot }} />}
      {children}
    </span>
  );
}

function HUDCard({ children, style, className = '', glow, mesh, padding = 16, onClick }) {
  const classes = ['glass', 'hud'];
  if (glow) classes.push(`glow-${glow}`);
  if (mesh) classes.push(`mesh-${mesh}`);
  if (onClick) classes.push('pressable');
  if (className) classes.push(className);
  return (
    <div className={classes.join(' ')} style={{ padding, ...style }} onClick={onClick}>
      <HUDTicks />
      {children}
    </div>
  );
}

function ConfettiBurst({ trigger, colors = ['#FF0033', '#00D4FF', '#B14CFF', '#B6FF3C', '#FFD23C', '#FF8A3C'] }) {
  const [tokens, setTokens] = useState([]);
  useEffect(() => {
    if (!trigger) return;
    const pieces = Array.from({ length: 50 }).map((_, i) => {
      const angle = (Math.PI * 2 * i) / 50 + (Math.random() - 0.5) * 0.4;
      const dist = 120 + Math.random() * 140;
      return { id: `${trigger}-${i}`, dx: Math.cos(angle) * dist + 'px', dy: Math.sin(angle) * dist + 'px', rot: Math.floor(Math.random() * 720 - 360) + 'deg', color: colors[i % colors.length], delay: Math.random() * 80 };
    });
    setTokens(pieces);
    const t = setTimeout(() => setTokens([]), 1300);
    return () => clearTimeout(t);
  }, [trigger]);
  return (
    <div className="confetti-host">
      {tokens.map((p) => (
        <span key={p.id} className="confetti-piece" style={{ background: p.color, '--dx': p.dx, '--dy': p.dy, '--rot': p.rot, animationDelay: `${p.delay}ms` }} />
      ))}
    </div>
  );
}

function StateMeter({ label, value, max = 10, color, onChange }) {
  const bars = Array.from({ length: max });
  const barRefs = useRef([]);
  const setFromX = (clientX) => {
    if (!barRefs.current[0]) return;
    const first = barRefs.current[0].getBoundingClientRect();
    const last = barRefs.current[max - 1].getBoundingClientRect();
    const total = last.right - first.left;
    const ratio = Math.max(0, Math.min(1, (clientX - first.left) / total));
    const next = Math.max(1, Math.round(ratio * max));
    if (next !== value) onChange?.(next);
  };
  const handleDown = (e) => {
    const move = (ev) => { const x = ev.touches ? ev.touches[0].clientX : ev.clientX; setFromX(x); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); window.removeEventListener('touchmove', move); window.removeEventListener('touchend', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
    window.addEventListener('touchmove', move);
    window.addEventListener('touchend', up);
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    setFromX(x);
  };
  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
        <span className="eyebrow" style={{ color: 'var(--muted)' }}>{label}</span>
        <span className="mono" style={{ fontSize: 11, color: color, fontWeight: 600 }}>{value}</span>
      </div>
      <div onMouseDown={handleDown} onTouchStart={handleDown} style={{ display: 'flex', gap: 3, cursor: 'pointer', touchAction: 'none' }}>
        {bars.map((_, i) => {
          const filled = i < value;
          return <div key={i} ref={(el) => (barRefs.current[i] = el)} style={{ flex: 1, height: 14, borderRadius: 2, background: filled ? color : 'rgba(255,255,255,0.06)', boxShadow: filled ? `0 0 8px ${color}80` : 'none', transition: 'background 200ms, box-shadow 200ms' }} />;
        })}
      </div>
    </div>
  );
}

function TimelineEvent({ time, label, color, kind, last }) {
  return (
    <div style={{ display: 'flex', gap: 12, position: 'relative' }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 2 }}>
        <div style={{ width: 10, height: 10, borderRadius: 999, background: color, boxShadow: `0 0 10px ${color}` }} />
        {!last && <div style={{ flex: 1, width: 1, marginTop: 4, background: 'linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03))' }} />}
      </div>
      <div style={{ flex: 1, paddingBottom: last ? 0 : 14 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
          <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>{time}</span>
          {kind && <Pill variant="muted" style={{ fontSize: 8 }}>{kind}</Pill>}
        </div>
        <div style={{ fontSize: 14, color: 'var(--text)', fontWeight: 500, marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

function StatTile({ label, value, suffix, color = 'var(--text)', format = (v) => Math.round(v), style }) {
  return (
    <div style={{ ...style }}>
      <div className="eyebrow" style={{ marginBottom: 4 }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
        <span className="display" style={{ fontSize: 36, color, lineHeight: 0.9 }}>
          <TickCounter value={value} format={format} />
        </span>
        {suffix && <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>{suffix}</span>}
      </div>
    </div>
  );
}

Object.assign(window, { HUDTicks, TickCounter, SectionHead, ProgressBar, Pill, HUDCard, ConfettiBurst, StateMeter, TimelineEvent, StatTile });
  </script>

function ReadinessRing({ value }) {
  const size = 88, stroke = 5;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const [progress, setProgress] = useState(0);
  useEffect(() => { const t = setTimeout(() => setProgress(value), 50); return () => clearTimeout(t); }, [value]);
  const dash = (c * progress) / 100;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <defs>
          <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#00D4FF" />
            <stop offset="100%" stopColor="#B14CFF" />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke="url(#ring-grad)" strokeWidth={stroke} fill="none" strokeLinecap="round" strokeDasharray={`${dash} ${c - dash}`} style={{ transition: 'stroke-dasharray 1100ms cubic-bezier(0.2, 0.7, 0.2, 1)', filter: 'drop-shadow(0 0 6px rgba(0, 212, 255, 0.5))' }} />

function BodyRadar({ size = 260 }) {
  const cx = size / 2, cy = size / 2, max = 100, radius = size / 2 - 36;
  const axes = RADAR_AXES.length;
  const pointAt = (i, v) => {
    const angle = -Math.PI / 2 + (i / axes) * Math.PI * 2;
    const r = (v / max) * radius;
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
  };
  const polyPoints = (vals) => vals.map((v, i) => pointAt(i, v).join(',')).join(' ');
  const [drawn, setDrawn] = useState(false);
  useEffect(() => { const t = setTimeout(() => setDrawn(true), 100); return () => clearTimeout(t); }, []);
  const currentPts = drawn ? polyPoints(RADAR_CURRENT) : polyPoints(RADAR_CURRENT.map(() => 0));
  const goalPts    = drawn ? polyPoints(RADAR_GOAL)    : polyPoints(RADAR_GOAL.map(() => 0));
  const rings = [0.25, 0.5, 0.75, 1];
  return (
    <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
      <svg width={size} height={size} style={{ overflow: 'visible' }}>
        <defs>
          <radialGradient id="radar-glow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stopColor="#00D4FF" stopOpacity="0.35" />
            <stop offset="100%" stopColor="#00D4FF" stopOpacity="0" />
          </radialGradient>
        </defs>
        {rings.map((rPct, idx) => {
          const pts = Array.from({ length: axes }).map((_, i) => {
            const angle = -Math.PI / 2 + (i / axes) * Math.PI * 2;
            const r = rPct * radius;
            return `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`;
          }).join(' ');
          return <polygon key={idx} points={pts} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1" strokeDasharray={idx === rings.length - 1 ? '0' : '2 4'} />;
        })}
        {Array.from({ length: axes }).map((_, i) => {
          const angle = -Math.PI / 2 + (i / axes) * Math.PI * 2;
          return <line key={i} x1={cx} y1={cy} x2={cx + radius * Math.cos(angle)} y2={cy + radius * Math.sin(angle)} stroke="rgba(255,255,255,0.06)" strokeWidth="1" />;
        })}
        <polygon points={goalPts} fill="rgba(177, 76, 255, 0.04)" stroke="#B14CFF" strokeWidth="1.2" strokeDasharray="3 4" style={{ transition: 'all 1100ms cubic-bezier(0.2,0.7,0.2,1)' }} />
        <polygon points={currentPts} fill="rgba(0, 212, 255, 0.18)" stroke="#00D4FF" strokeWidth="2" style={{ filter: 'drop-shadow(0 0 8px rgba(0, 212, 255, 0.6))', transition: 'all 1100ms cubic-bezier(0.2,0.7,0.2,1)' }} />
        {RADAR_CURRENT.map((v, i) => {
          const [x, y] = drawn ? pointAt(i, v) : pointAt(i, 0);
          return <circle key={i} cx={x} cy={y} r="3" fill="#00D4FF" style={{ filter: 'drop-shadow(0 0 6px rgba(0, 212, 255, 0.8))', transition: 'all 1100ms cubic-bezier(0.2,0.7,0.2,1)' }} />;
        })}
      </svg>
      {RADAR_AXES.map((label, i) => {
        const angle = -Math.PI / 2 + (i / axes) * Math.PI * 2;
        const labelR = radius + 18;
        const x = cx + labelR * Math.cos(angle);
        const y = cy + labelR * Math.sin(angle);
        return (
          <div key={label} style={{ position: 'absolute', left: x, top: y, transform: 'translate(-50%, -50%)', fontFamily: 'var(--font-mono)', fontSize: 9, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'var(--muted)', whiteSpace: 'nowrap' }}>
            <div style={{ textAlign: 'center' }}>{label}</div>
            <div style={{ color: 'var(--cyan)', fontWeight: 700, fontSize: 10, marginTop: 1 }}>{RADAR_CURRENT[i]}</div>
          </div>
        );
      })}
      <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', textAlign: 'center', pointerEvents: 'none' }}>
        <div className="eyebrow" style={{ color: 'var(--dim)' }}>OVERALL</div>
        <div className="display" style={{ fontSize: 28, color: 'var(--cyan)', lineHeight: 1 }}><TickCounter value={74} /></div>
      </div>
    </div>
  );
}

        setTypingText('');

    case 'create': screen = <ContentStudio />; break;
    case 'ona':    screen = <ONAHQ />; break;
    case 'ai':     screen = <AIScreen />; break;
    default:       screen = <MissionControl state={missionState} setState={setMissionState} onXp={fireXp} />;
  }

  return (
    <IOSDevice dark width={402} height={874}>
      <div className="screen-host">
        <div className="screen-scroll" key={tab}>
          {screen}
        </div>
        <TabBar
          active={tab}
          onChange={setTab}
          onFab={openCapture}
          onFabLong={() => setSpotlight(true)}
        />
        <QuickCapture open={capture.open} voiceMode={capture.voice} onClose={() => setCapture({ open: false, voice: false })} />
        <CommandSpotlight open={spotlight} onClose={() => setSpotlight(false)} onCapture={openCapture} />
        <XpFloat trigger={xpTrigger} />
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
