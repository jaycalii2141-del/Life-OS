// ─── Hexagonal Radar Chart ───────────────────────────────────────────────────
function RadarChart({ progress }) {
  const cx = 140, cy = 140, maxR = 120;
  const gridRings = [0.25, 0.5, 0.75, 1.0];

  function getPoint(i, r) {
    const angle = (i * 60 - 90) * Math.PI / 180;
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
  }

  function polyPoints(vals, scale = 1) {
    return vals.map((v, i) => {
      const r = (v / 100) * maxR * scale;
      const [x, y] = getPoint(i, r);
      return `${x},${y}`;
    }).join(' ');
  }

  const currentVals = DIMS.map(d => d.val);
  const goalVals = DIMS.map(d => d.goal);

  // Grid polygon at each ring level
  function gridRingPoints(frac) {
    return DIMS.map((_, i) => {
      const [x, y] = getPoint(i, maxR * frac);
      return `${x},${y}`;
    }).join(' ');
  }

  return (
    <svg width="280" height="280" viewBox="0 0 280 280">
      {/* Grid rings */}
      {gridRings.map(frac => (
        <polygon
          key={frac}
          points={gridRingPoints(frac)}
          fill="none"
          stroke="rgba(107,114,128,0.25)"
          strokeWidth="1"
        />
      ))}

      {/* Axis lines */}
      {DIMS.map((_, i) => {
        const [x, y] = getPoint(i, maxR);
        return (
          <line
            key={i}
            x1={cx} y1={cy}
            x2={x} y2={y}
            stroke="rgba(107,114,128,0.2)"
            strokeWidth="1"
          />
        );
      })}

      {/* Goal polygon (dashed gold outline) */}
      <polygon
        points={polyPoints(goalVals)}
        fill="none"
        stroke="#E9C46A"
        strokeWidth="1.5"
        strokeDasharray="4 3"
        opacity="0.5"
      />

      {/* Current polygon (violet fill, animated) */}
      <polygon
        points={polyPoints(currentVals, progress)}
        fill="rgba(177,76,255,0.18)"
        stroke="#B14CFF"
        strokeWidth="2"
      />

      {/* Axis labels */}
      {DIMS.map((dim, i) => {
        const labelR = maxR + 20;
        const [lx, ly] = getPoint(i, labelR);
        const [sx, sy] = getPoint(i, maxR + 34);
        let ta = 'middle';
        if (lx < cx - 10) ta = 'end';
        if (lx > cx + 10) ta = 'start';

        return (
          <g key={dim.key}>
            <text
              x={lx}
              y={ly + 4}
              textAnchor={ta}
              fill={dim.color}
              fontSize="9"
              fontFamily="'JetBrains Mono', monospace"
              letterSpacing="0.08em"
              fontWeight="600"
            >
              {dim.key}
            </text>
            <text
              x={sx}
              y={sy + 4}
              textAnchor={ta}
              fill="rgba(167,173,186,0.7)"
              fontSize="8"
              fontFamily="'JetBrains Mono', monospace"
            >
              {dim.val}
            </text>
          </g>
        );
      })}

      {/* Center dot */}
      <circle cx={cx} cy={cy} r="3" fill="#B14CFF" opacity="0.8" />
    </svg>
  );
}

// ─── Arc Progress Ring ────────────────────────────────────────────────────────
function ArcRing({ value, color, progress }) {
  const r = 64, cx = 80, cy = 80;
  const circ = 2 * Math.PI * r;
  const dash = circ * (value / 100) * progress;
  const gap = circ - dash;

  return (
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8" />
      <circle
        cx={cx} cy={cy} r={r}
        fill="none"
        stroke={color}
        strokeWidth="8"
        strokeLinecap="round"
        strokeDasharray={`${dash} ${gap}`}
        strokeDashoffset={circ * 0.25}
        style={{ filter: `drop-shadow(0 0 6px ${color}66)` }}
      />
      <text x={cx} y={cy - 8} textAnchor="middle" fill={color} fontSize="36" fontFamily="'Bebas Neue',sans-serif">
        {Math.round(value * progress)}
      </text>
      <text x={cx} y={cy + 14} textAnchor="middle" fill="rgba(167,173,186,0.6)" fontSize="12" fontFamily="'Inter',sans-serif">
        / 100
      </text>
    </svg>
  );
}

// ─── Sparkline ────────────────────────────────────────────────────────────────
function Sparkline({ data, color }) {
  const max = Math.max(...data);
  const weeks = ['W1','W2','W3','W4','W5','W6'];
  return (
    <div>
      <div className="sparkline-bars">
        {data.map((v, i) => (
          <div
            key={i}
            className="sparkline-bar"
            style={{
              height: `${(v / max) * 100}%`,
              background: `linear-gradient(180deg, ${color}, ${color}66)`,
              borderRadius: '3px 3px 0 0',
            }}
          />
        ))}
      </div>
      <div className="sparkline-labels">
        {weeks.map(w => (
          <div key={w} className="sparkline-label">{w}</div>
        ))}
      </div>
    </div>
  );
}

// ─── Screen 1 ─────────────────────────────────────────────────────────────────
function Screen1({ onDimTap, onLegacy }) {
  const [radarProg, setRadarProg] = useState(0);

  const [scoreCount, setScoreCount] = useState(0);
  const raf = useRef(null);
  const startTime = useRef(null);

  useEffect(() => {
    const duration = 1200;
    const animate = (ts) => {
      if (!startTime.current) startTime.current = ts;
      const elapsed = ts - startTime.current;
      const t = Math.min(elapsed / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      setRadarProg(ease);
      setScoreCount(Math.round(79 * ease));
      setBarProgs(DIMS.map((_, i) => {
        const delay = i * 80;
        const barT = Math.max(0, Math.min((elapsed - delay) / 800, 1));
        return barT < 0.5 ? 2*barT*barT : -1+(4-2*barT)*barT;
      }));
      if (t < 1) raf.current = requestAnimationFrame(animate);
    };
    raf.current = requestAnimationFrame(animate);
    return () => raf.current && cancelAnimationFrame(raf.current);
  }, []);

  return (
    <div className="screen-content">
      {/* Status bar */}
      <div className="status-bar">
        <span className="status-time">9:41</span>
        <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#6B7280',letterSpacing:'0.08em'}}>JAM HQ</span>

        </div>

      </div>

      {/* Attribute bars */}

              <div

                  background: `linear-gradient(90deg, ${dim.color}99, ${dim.color})`,
                  boxShadow: `0 0 6px ${dim.color}55`,

            </div>
            <div className="attr-trend" style={{color: dim.trend === '↑' ? '#34D399' : '#6B7280'}}>
              {dim.trend}
            </div>
          </div>

      </div>

      {/* North Star card */}
      <div className="north-star-card glass" style={{margin:'0 20px 14px',padding:'14px 16px',borderColor:'rgba(233,196,106,0.25)'}}>
