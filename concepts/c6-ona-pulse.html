<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DESIGN TOKENS ───────────────────────────────────────────────
const T = {
  teal: '#2DD4BF', cyan: '#45B7E8', lime: '#34D399',
  gold: '#E9C46A', orange: '#F4A261', red: '#FF6B5B',
  violet: '#B14CFF', text: '#F5F5F7', muted: '#A7ADBA', dim: '#6B7280',
  bg: '#06060A',
};

function readinessColor(val) {
  if (val >= 80) return T.teal;
  if (val >= 60) return T.gold;
  return T.red;
}

function readinessLabel(val) {
  if (val >= 80) return 'PRIMED';
  if (val >= 60) return 'MODERATE';
  return 'REST DAY';
}

// ─── MINI SPARKLINE ──────────────────────────────────────────────
function Sparkline({ data, highlight = data.length - 1, width = 48, height = 20 }) {
  const max = Math.max(...data);
  const min = Math.min(...data) - 2;
  const range = max - min || 1;
  const barW = (width - (data.length - 1) * 2) / data.length;

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((v, i) => {
        const bh = ((v - min) / range) * (height - 2) + 2;
        const x = i * (barW + 2);
        const y = height - bh;
        const color = i === highlight ? readinessColor(v) : 'rgba(255,255,255,0.18)';
        return (
          <rect
            key={i}
            x={x} y={y} width={barW} height={bh}
            rx={1.5}
            fill={color}
          />
        );
      })}
    </svg>
  );
}

// ─── READINESS RING ──────────────────────────────────────────────
function ReadinessRing({ target = 87 }) {
  const [val, setVal] = useState(0);
  const r = 52;
  const circ = 2 * Math.PI * r;
  const dash = (val / 100) * circ;
  const color = readinessColor(val);
  const startTime = useRef(null);
  const duration = 1200;

  useEffect(() => {
    let raf;
    function tick(ts) {
      if (!startTime.current) startTime.current = ts;
      const elapsed = ts - startTime.current;
      const progress = Math.min(elapsed / duration, 1);
      // ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(eased * target));
      if (progress < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 8 }}>
      <svg width={280} height={280} viewBox="0 0 280 280">
        {/* bg track */}
        <circle
          cx={140} cy={140} r={r * 2}
          fill="none"
          stroke="rgba(255,255,255,0.06)"
          strokeWidth={10}
        />
        {/* glow layer */}
        <circle
          cx={140} cy={140} r={r * 2}
          fill="none"
          stroke={color}
          strokeWidth={10}
          strokeOpacity={0.15}
          strokeDasharray={`${(val / 100) * (2 * Math.PI * r * 2)} ${2 * Math.PI * r * 2}`}
          strokeDashoffset={2 * Math.PI * r * 2 * 0.25}
          strokeLinecap="round"
          style={{ filter: `blur(6px)` }}
          transform="rotate(-90 140 140)"
        />
        {/* main arc */}
        <circle
          cx={140} cy={140} r={r * 2}
          fill="none"
          stroke={color}
          strokeWidth={10}
          strokeDasharray={`${(val / 100) * (2 * Math.PI * r * 2)} ${2 * Math.PI * r * 2}`}
          strokeDashoffset={0}
          strokeLinecap="round"
          transform="rotate(-90 140 140)"
          style={{ transition: 'stroke 0.4s ease', filter: `drop-shadow(0 0 8px ${color}80)` }}
        />
        {/* inner decorative ring */}
        <circle
          cx={140} cy={140} r={r * 2 - 18}
          fill="none"
          stroke="rgba(255,255,255,0.03)"
          strokeWidth={1}
        />
        {/* value text */}
        <text
          x={140} y={133}
          textAnchor="middle"
          dominantBaseline="middle"
          fontFamily="'Bebas Neue', sans-serif"
          fontSize={62}
          fill={color}
          style={{ filter: `drop-shadow(0 0 12px ${color}80)` }}
        >
          {val}
        </text>
        {/* label */}
        <text
          x={140} y={168}
          textAnchor="middle"
          fontFamily="'JetBrains Mono', monospace"
          fontSize={10}
          fontWeight={700}
          fill="rgba(255,255,255,0.4)"
          letterSpacing={3}
        >
          READINESS
        </text>
      </svg>
    </div>
  );
}

// ─── METRIC PILL ─────────────────────────────────────────────────
function MetricPill({ label, value, dotColor }) {
  return (
    <div style={{
      flex: 1,
      background: 'rgba(255,255,255,0.04)',
      border: '1px solid rgba(255,255,255,0.08)',

      borderRadius: 10,
      padding: '8px 6px',
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      gap: 4,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
        <div style={{ width: 5, height: 5, borderRadius: '50%', background: dotColor, boxShadow: `0 0 6px ${dotColor}` }} />
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, fontWeight: 700, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.10em', textTransform: 'uppercase' }}>{label}</span>
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700, color: T.text }}>{value}</span>
    </div>
  );
}

// ─── BAR CHART (Coach View) ───────────────────────────────────────
function FloorLoadChart() {
  const hours = ['8a','10a','12p','2p','4p','6p','8p'];
  const data =  [12,  18,  22,   28,  35,  48,  20];
  const max = Math.max(...data);
  const peak = data.indexOf(max);

  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 56, padding: '0 2px' }}>
      {data.map((v, i) => {
        const h = Math.max((v / max) * 52, 4);
        const color = i === peak ? T.teal : i >= 4 ? T.gold : 'rgba(255,255,255,0.18)';
        return (
          <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
            <div style={{
              width: '100%', height: h, borderRadius: 3,
              background: color,
              boxShadow: i === peak ? `0 0 8px ${T.teal}60` : 'none',
              transition: 'height 0.3s ease',
            }} />
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 7, color: T.dim }}>{hours[i]}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── COACH AVATAR ────────────────────────────────────────────────
function CoachAvatar({ name, score, size = 48 }) {
  const color = readinessColor(score);
  const initial = name[0];
  const ringOffset = (1 - score / 100) * (2 * Math.PI * ((size / 2) - 3));
  const circ = 2 * Math.PI * ((size / 2) - 3);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
      <div style={{ position: 'relative', width: size, height: size }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position: 'absolute', top: 0, left: 0 }}>
          <circle cx={size/2} cy={size/2} r={(size/2)-3} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={2.5} />
          <circle
            cx={size/2} cy={size/2} r={(size/2)-3}
            fill="none"
            stroke={color}
            strokeWidth={2.5}
            strokeDasharray={`${(score / 100) * circ} ${circ}`}
            strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{ filter: `drop-shadow(0 0 4px ${color}80)` }}
          />
        </svg>
        <div style={{
          position: 'absolute', top: 3, left: 3,
          width: size - 6, height: size - 6,
          borderRadius: '50%',
          background: `rgba(${color === T.teal ? '45,212,191' : color === T.gold ? '233,196,106' : '255,107,91'},0.15)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: "'Bebas Neue', sans-serif",
          fontSize: size * 0.38,
          color: color,
        }}>{initial}</div>
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: T.muted }}>{name}</span>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 700, color }}>{score}</span>
    </div>
  );
}

// ─── ATHLETES DATA ───────────────────────────────────────────────
const ATHLETES = [
  { name: 'Marcus', score: 92, trend: [78, 84, 80, 88, 92] },
  { name: 'Leila',  score: 71, trend: [68, 72, 65, 74, 71] },

  { name: 'Sam',    score: 45, trend: [72, 65, 55, 48, 45] },
  { name: 'Kai',    score: 83, trend: [76, 80, 78, 81, 83] },
  { name: 'Zoe',    score: 67, trend: [70, 64, 69, 65, 67] },
  { name: 'Tyler',  score: 91, trend: [85, 88, 84, 89, 91] },
  { name: 'Mia',    score: 52, trend: [74, 68, 60, 55, 52] },
];

// ─── SCREEN 2 — GYM PULSE ────────────────────────────────────────
function ScreenGymPulse() {
  const [filter, setFilter] = useState('ALL');
  const [flashedIds, setFlashedIds] = useState(new Set());

  const filtered = ATHLETES.filter(a => {
    if (filter === 'PRIMED') return a.score >= 80;
    if (filter === 'NEEDS ATTENTION') return a.score < 60;
    return true;
  });

  function handleReachOut(name) {
    setFlashedIds(prev => new Set([...prev, name]));
    setTimeout(() => {
      setFlashedIds(prev => {
        const next = new Set(prev);
        next.delete(name);
        return next;
      });
    }, 800);
  }

  return (
    <div className="screen-fade" style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 24, color: T.text, letterSpacing: '0.06em', lineHeight: 1 }}>GYM PULSE</div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: T.dim, letterSpacing: '0.10em', marginTop: 2 }}>· TODAY</div>
        </div>
        <div style={{
          background: 'rgba(45,212,191,0.1)',
          border: '1px solid rgba(45,212,191,0.25)',
          borderRadius: 20,
          padding: '4px 10px',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 10,
          fontWeight: 700,
          color: T.teal,
        }}>24 checked in</div>
      </div>

      {/* Filter chips */}
      <div style={{ display: 'flex', gap: 6 }}>
        {['ALL', 'PRIMED', 'NEEDS ATTENTION'].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            flex: f === 'NEEDS ATTENTION' ? 2 : 1,
            padding: '6px 8px',
            borderRadius: 8,
            border: filter === f ? `1px solid rgba(45,212,191,0.3)` : '1px solid rgba(255,255,255,0.08)',
            background: filter === f ? 'rgba(45,212,191,0.1)' : 'rgba(255,255,255,0.03)',
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 8,
            fontWeight: 700,
            letterSpacing: '0.06em',
            color: filter === f ? T.teal : T.dim,
            cursor: 'pointer',
            transition: 'all 0.2s',
            whiteSpace: 'nowrap',
          }}>{f}</button>
        ))}
      </div>

      {/* Athlete Rows */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {filtered.map((a, i) => {
          const color = readinessColor(a.score);
          const label = readinessLabel(a.score);
          const isFlashed = flashedIds.has(a.name);
          const isAttention = a.score < 60;

          return (
            <div
              key={a.name}
              className={isFlashed ? 'reach-out-flash' : ''}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 10,
                padding: '10px 12px',
                background: isFlashed ? 'rgba(45,212,191,0.18)' : 'rgba(255,255,255,0.04)',
                border: `1px solid ${isFlashed ? 'rgba(45,212,191,0.4)' : 'rgba(255,255,255,0.07)'}`,
                boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.08)',
                borderRadius: 12,
                transition: 'all 0.2s',
                animation: `fadeUp 0.3s ease-out ${i * 60}ms both`,
              }}
            >
              {/* Avatar */}
              <div style={{
                width: 36, height: 36, borderRadius: '50%',
                background: `rgba(${color === T.teal ? '45,212,191' : color === T.gold ? '233,196,106' : '255,107,91'},0.15)`,
                border: `2px solid ${color}40`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color,
                flexShrink: 0,
              }}>{a.name[0]}</div>

              {/* Name */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 2 }}>{a.name}</div>
                <div style={{
                  display: 'inline-block',
                  padding: '2px 7px',
                  borderRadius: 6,
                  background: `rgba(${color === T.teal ? '45,212,191' : color === T.gold ? '233,196,106' : '255,107,91'},0.12)`,
                  border: `1px solid ${color}30`,
                  fontFamily: "'JetBrains Mono', monospace",
                  fontSize: 7,
                  fontWeight: 700,
                  color,
                  letterSpacing: '0.08em',
                }}>{label}</div>
              </div>

              {/* Score */}
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, color, lineHeight: 1, textShadow: `0 0 12px ${color}60` }}>
                {a.score}
              </div>

              {/* Sparkline */}
              <div style={{ flexShrink: 0 }}>
                <Sparkline data={a.trend} width={40} height={22} />
              </div>

              {/* Reach out button */}
              {isAttention && (
                <button
                  onClick={() => handleReachOut(a.name)}
                  style={{
                    padding: '5px 8px',
                    borderRadius: 7,
                    border: isFlashed ? `1px solid ${T.teal}` : '1px solid rgba(255,107,91,0.35)',
                    background: isFlashed ? `rgba(45,212,191,0.2)` : 'rgba(255,107,91,0.1)',
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 7,
                    fontWeight: 700,
                    letterSpacing: '0.06em',
                    color: isFlashed ? T.teal : T.red,
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                    whiteSpace: 'nowrap',
                    flexShrink: 0,
                  }}
                >
                  {isFlashed ? '✓ SENT' : 'REACH OUT'}
                </button>
              )}
            </div>
          );
        })}
      </div>

      {filter === 'NEEDS ATTENTION' && filtered.length === 0 && (
        <div style={{ textAlign: 'center', padding: 24, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: T.dim }}>
          All athletes in good standing
        </div>
      )}
    </div>
  );
}
