<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C8 · JAM AI — JAM HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0B0D;
      --text: #F5F5F7;
      --muted: #A7ADBA;
      --dim: #6B7280;
      --cyan: #45B7E8;
      --teal: #2DD4BF;
      --lime: #34D399;
      --gold: #E9C46A;
      --orange: #F4A261;
      --red: #FF6B5B;
      --violet: #B14CFF;
    }

    body {
      background: #0A0B0D;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(177,76,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(69,183,232,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 60% 40%, rgba(233,196,106,0.05) 0%, transparent 50%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
    }

    /* Page nav */
    .page-nav {
      width: 100%;
      max-width: 430px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .page-nav a:hover { color: var(--violet); }
    .page-nav-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.12em;
    }

    /* Phone shell */
    .phone {
      width: 402px;
      height: 874px;
      background: #06060A;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        0 40px 120px rgba(0,0,0,0.9),
        0 0 80px rgba(177,76,255,0.06),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 50;
    }

    /* Screen */
    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .screen-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }
    .screen-scroll::-webkit-scrollbar { display: none; }

    /* Glass utility */
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(20px);
      border-radius: 16px;
    }

    /* Orb animations */
    @keyframes orbSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes orbBreathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes orbSpinBreathe {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.08); }
      50% { transform: rotate(180deg) scale(1.1); }
      75% { transform: rotate(270deg) scale(1.05); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes smallOrbSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes chipGlow {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50% { box-shadow: 0 0 12px 2px var(--chip-color); }
    }
    @keyframes typedCursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Transitions */
    .fade-up {
      animation: fadeUp 0.4s ease forwards;
    }

    /* Chip styles */
    .chip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .chip {
      padding: 10px 6px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
      text-align: center;
    }
    .chip:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }
    .chip-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.2;
    }

    /* History items */
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:hover { background: rgba(255,255,255,0.04); }
    .history-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Chat bubbles */
    .bubble-ai {
      align-self: flex-start;
      max-width: 85%;
      background: rgba(177,76,255,0.08);
      border: 1px solid rgba(177,76,255,0.25);
      border-radius: 16px 16px 16px 4px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }
    .bubble-jay {
      align-self: flex-end;
      max-width: 78%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px 16px 4px 16px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    /* Text input */
    .text-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(6,6,10,0.9);
      backdrop-filter: blur(20px);
    }
    .text-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: rgba(177,76,255,0.4); }
    .text-input::placeholder { color: var(--dim); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--violet);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #c96fff; transform: scale(1.05); }

    .mic-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }
    .mic-btn.listening {
      background: rgba(255,107,91,0.15);
      border-color: rgba(255,107,91,0.4);
    }
    .mic-btn.listening::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(255,107,91,0.5);
      animation: pulseRing 1.2s ease-out infinite;
    }

    /* Action card */
    .action-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    /* Plan card */
    .plan-card {
      background: rgba(233,196,106,0.08);
      border: 1px solid rgba(233,196,106,0.20);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 4px 0;
    }

    /* Hook cards */
    .hook-card {
      background: rgba(69,183,232,0.07);
      border: 1px solid rgba(69,183,232,0.20);
      border-radius: 12px;
      padding: 11px 13px;
      margin: 3px 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .hook-card:hover {
      background: rgba(69,183,232,0.12);
      transform: translateX(2px);
    }

    /* Morning brief card */
    .brief-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 3px solid var(--violet);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .brief-card:hover { background: rgba(177,76,255,0.06); }

    /* Scrollable screen padding */
    .screen-content {
      padding: 60px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-content {
      padding: 60px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
    }

    /* Header */
    .screen-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 56px 18px 12px;
      background: linear-gradient(to bottom, rgba(6,6,10,1) 70%, transparent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.10); }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <nav class="page-nav">
    <a href="index.html">← INDEX</a>
    <span class="page-nav-label">C8 · JAM AI</span>
    <span style="display:flex;gap:12px;">
      <a href="c7-content-os.html">← C7</a>
      <a href="c9-becoming.html">C9 →</a>
    </span>
  </nav>

  <div class="phone">
    <div class="dynamic-island"></div>
    <div id="root" style="width:100%;height:100%;"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Orb components ── */
    function LargeOrb() {
      return (
        <div style={{
          width: 90, height: 90,
          borderRadius: '50%',
          position: 'relative',
          flexShrink: 0,
        }}>
          {/* glow bg */}
          <div style={{
            position: 'absolute',
            inset: -20,
            borderRadius: '50%',
            background: 'radial-gradient(circle, rgba(177,76,255,0.25) 0%, transparent 70%)',
          }} />
          {/* spinning orb */}
          <div style={{
            width: '100%', height: '100%',
            borderRadius: '50%',
            background: 'conic-gradient(from 0deg, #B14CFF, #E9C46A, #45B7E8, #B14CFF)',
            animation: 'orbSpinBreathe 8s linear infinite',
            filter: 'blur(0px)',
          }} />
          {/* inner shine */}
          <div style={{
            position: 'absolute',
            inset: 4,
            borderRadius: '50%',
            background: 'radial-gradient(circle at 35% 30%, rgba(255,255,255,0.35), transparent 60%)',
            pointerEvents: 'none',
          }} />
        </div>
      );
    }

    function SmallOrb({ size = 20 }) {
      return (
        <div style={{
          width: size, height: size,
          borderRadius: '50%',
          background: 'conic-gradient(from 0deg, #B14CFF, #E9C46A, #45B7E8, #B14CFF)',
          animation: 'smallOrbSpin 4s linear infinite',
          flexShrink: 0,
          position: 'relative',
        }}>
          <div style={{
            position: 'absolute',
            inset: 2,
            borderRadius: '50%',
            background: 'radial-gradient(circle at 35% 30%, rgba(255,255,255,0.4), transparent 60%)',
          }} />
        </div>
      );
    }

    /* ── Quick action chips ── */
    const CHIPS = [
      { label: 'PLAN MY DAY', color: '#B14CFF', screen: 2 },
      { label: 'WRITE A HOOK', color: '#45B7E8', screen: 3, context: 'hook' },
      { label: 'DEBRIEF SESSION', color: '#34D399', screen: 3, context: 'debrief' },
      { label: 'ONA PULSE', color: '#FF6B5B', screen: 3, context: 'ona' },
      { label: 'SEASON CHECK', color: '#E9C46A', screen: 3, context: 'season' },
      { label: 'ANYTHING', color: '#6B7280', screen: 3, context: 'anything' },
    ];

    /* ── Screen 1: HOME ── */
    function Screen1({ onNavigate }) {
      const [briefOpen, setBriefOpen] = useState(false);

      return (
        <div className="screen">
          <div className="dynamic-island" style={{display:'none'}} />
          <div className="screen-scroll">
            <div className="screen-content">

              {/* Header */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 4 }}>
                <span style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: '0.06em', color: '#F5F5F7' }}>JAM AI</span>
                <SmallOrb size={24} />
              </div>

              {/* Central orb area */}
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16, paddingTop: 8, paddingBottom: 4 }}>
                <LargeOrb />
                <div>
                  <div style={{ fontFamily: "'Bebas Neue'", fontSize: 28, letterSpacing: '0.04em', textAlign: 'center', color: '#F5F5F7' }}>
                    HOW CAN I MOVE YOU?
                  </div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: '#6B7280', textAlign: 'center', marginTop: 4, letterSpacing: '0.04em' }}>
                    Your coach · strategist · editor
                  </div>
                </div>
              </div>

              {/* Morning Brief card */}
              <div
                className="brief-card"
                onClick={() => setBriefOpen(o => !o)}
              >
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: briefOpen ? 10 : 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <SmallOrb size={14} />
                    <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, fontWeight: 700, letterSpacing: '0.10em', color: '#B14CFF' }}>MORNING BRIEF</span>
                  </div>
                  <span style={{ color: '#6B7280', fontSize: 12, transition: 'transform 0.2s', display: 'inline-block', transform: briefOpen ? 'rotate(180deg)' : 'none' }}>▾</span>
                </div>
                {briefOpen && (
                  <div style={{ fontSize: 12, color: '#A7ADBA', lineHeight: 1.6 }}>
                    Readiness 87 · Green zone · B-twist window today · ONA: Marcus &amp; Leila need touchpoints · Season 3 review overdue
                  </div>
                )}
              </div>

              {/* Quick action chips */}
              <div>
                <div className="section-label">QUICK ACTIONS</div>
                <div className="chip-grid">
                  {CHIPS.map((chip, i) => (
                    <div
                      key={chip.label}
                      className="chip"
                      style={{ '--chip-color': chip.color }}
                      onClick={() => onNavigate(chip.screen, chip.context)}
                    >
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: chip.color, boxShadow: `0 0 6px ${chip.color}` }} />
                      <span className="chip-label" style={{ color: chip.color }}>{chip.label}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Recent */}
              <div>
                <div className="section-label">RECENT</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                  {[
                    { title: 'Hook for B-twist tutorial', time: '2h ago', tag: 'Content', color: '#45B7E8' },
                    { title: 'Debrief — Tricking session', time: 'Yesterday', tag: 'Training', color: '#34D399' },
                    { title: 'ONA lead strategy', time: '2d ago', tag: 'Business', color: '#FF6B5B' },
                  ].map((item, i) => (
                    <div
                      key={i}
                      className="history-item"
                      onClick={() => onNavigate(3, 'history')}
                    >
                      <div className="history-dot" style={{ background: item.color, boxShadow: `0 0 4px ${item.color}` }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, color: '#F5F5F7', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.title}</div>
                        <div style={{ fontSize: 11, color: '#6B7280', marginTop: 1 }}>{item.time} · {item.tag}</div>
                      </div>
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M5 3l4 4-4 4" stroke="#6B7280" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    /* ── Typewriter hook ── */
    function useTypewriter(text, speed = 22, startDelay = 400) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);
      useEffect(() => {
        setDisplayed('');
        setDone(false);
        let i = 0;
        const delay = setTimeout(() => {
          const interval = setInterval(() => {
            i++;
            setDisplayed(text.slice(0, i));
            if (i >= text.length) {
              clearInterval(interval);
              setDone(true);
            }
          }, speed);
          return () => clearInterval(interval);
        }, startDelay);
        return () => clearTimeout(delay);
      }, [text]);
      return { displayed, done };
    }

    /* ── Screen 2: MORNING BRIEF ── */
    const NARRATION = "Readiness is 87 today — you're in the green. This is your window for high-skill work. One focus: the B-twist tutorial you've been sitting on. Film it today while your body is fresh. ONA has two warm leads going cold — Marcus and Leila need a touchpoint before noon. For the afternoon, I'd block 90 minutes for the Season 3 review — you're 7 weeks in and the pacing needs attention.";

    const ACTION_CARDS = [
      { title: 'FILM B-TWIST TUTORIAL', btn: 'Mark as One Thing', color: '#B14CFF', icon: '🎯' },
      { title: 'CONTACT MARCUS + LEILA', btn: 'Open ONA', color: '#FF6B5B', icon: '📞' },
      { title: 'SEASON 3 REVIEW', btn: 'View Season', color: '#E9C46A', icon: '📅' },
    ];

    function Screen2({ onBack, onChat }) {
      const { displayed, done } = useTypewriter(NARRATION, 22, 600);
      const [visibleCards, setVisibleCards] = useState([]);

      useEffect(() => {
        if (!done) return;
        ACTION_CARDS.forEach((_, i) => {
          setTimeout(() => {
            setVisibleCards(prev => [...prev, i]);
          }, 400 + i * 300);
        });
      }, [done]);

      return (
        <div className="screen">
          {/* Header */}
          <div className="screen-header">
            <button className="back-btn" onClick={onBack}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8l5 5" stroke="#F5F5F7" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, letterSpacing: '0.06em', color: '#F5F5F7' }}>MORNING BRIEF</span>
          </div>

          <div className="screen-scroll">
            <div className="screen-content" style={{ paddingTop: 80 }}>

              {/* Date + greeting */}
              <div>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: '#6B7280', letterSpacing: '0.10em', marginBottom: 4 }}>MON · JUN 23 · 2026</div>
                <div style={{ fontFamily: "'Bebas Neue'", fontSize: 32, letterSpacing: '0.04em', color: '#F5F5F7', lineHeight: 1 }}>GOOD MORNING, JAY</div>
              </div>

              {/* AI narration with typewriter */}
              <div style={{
                background: 'rgba(177,76,255,0.06)',
                border: '1px solid rgba(177,76,255,0.18)',
                borderRadius: 16,
                padding: '16px 18px',
                position: 'relative',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 10 }}>
                  <SmallOrb size={14} />
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', color: '#B14CFF' }}>JAM AI · DAILY BRIEF</span>
                </div>
                <p style={{ fontSize: 13, lineHeight: 1.65, color: '#F5F5F7', minHeight: 80 }}>
                  {displayed}
                  {!done && (
                    <span style={{ display: 'inline-block', width: 2, height: 14, background: '#B14CFF', marginLeft: 2, verticalAlign: 'middle', animation: 'typedCursor 0.8s step-end infinite' }} />
                  )}
                </p>
              </div>

              {/* Action cards */}
              {visibleCards.length > 0 && (
                <div>
                  <div className="section-label">TODAY'S ACTIONS</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {ACTION_CARDS.map((card, i) => visibleCards.includes(i) && (
                      <div
                        key={i}
                        className="action-card fade-up"
                        style={{ animationDelay: `${i * 0.05}s`, borderLeft: `3px solid ${card.color}` }}
                      >
                        <div style={{ flex: 1 }}>
                          <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', color: card.color, marginBottom: 2 }}>{card.title}</div>
                          <div style={{ fontSize: 11, color: '#6B7280' }}>Tap to act</div>
                        </div>
                        <button style={{
                          background: `rgba(${card.color === '#B14CFF' ? '177,76,255' : card.color === '#FF6B5B' ? '255,107,91' : '233,196,106'},0.12)`,
                          border: `1px solid ${card.color}30`,
                          borderRadius: 8,
                          padding: '7px 10px',
                          fontFamily: "'JetBrains Mono'",
                          fontSize: 9,
                          fontWeight: 700,
                          letterSpacing: '0.06em',
                          color: card.color,
                          cursor: 'pointer',
                          whiteSpace: 'nowrap',
                        }}>
                          {card.btn}
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ height: 16 }} />
            </div>
          </div>

          {/* Follow-up input */}
          <div className="text-input-row">
            <input
              className="text-input"
              placeholder="Ask a follow-up…"
              onKeyDown={e => { if (e.key === 'Enter' && e.target.value.trim()) onChat(); }}
            />
            <button className="send-btn" onClick={onChat}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    /* ── Screen 3: DIALOGUE ── */
    const CHAT_MESSAGES = [
      { role: 'ai', content: "Your B-twist is at 82% — you're 3–4 sessions from mastery. Want me to build you a sprint plan?", delay: 0 },
      { role: 'jay', content: "Yes, give me a 2-week plan", delay: 350 },
      { role: 'ai', content: null, plan: true, delay: 700 },
      { role: 'jay', content: "What about the content angle?", delay: 1100 },
      { role: 'ai', content: "The B-twist journey is your best performing content format. Film sessions 1, 3, and the breakthrough — doc-style. Here are 3 hooks to capture along the way:", hooks: true, delay: 1500 },
    ];

    const PLAN_STEPS = [
      { n: '01', title: 'Sessions 1–3', desc: 'Full approach speed, 3×5 reps, video every set' },
      { n: '02', title: 'Sessions 4–6', desc: 'Add rotation cue, drill one-leg kick out' },
      { n: '03', title: 'Sessions 7–9', desc: 'Remove mat, full floor — 70% intent' },
      { n: '04', title: 'Sessions 10–12', desc: 'Performance reps — film the breakthrough session' },
    ];

    const HOOKS = [
      '"The one skill I keep almost landing…"',
      '"Day 1 vs Day 14 — the full journey"',
      '"3 things I had wrong about the B-twist"',
    ];

    function Screen3({ onBack, context }) {
      const [visible, setVisible] = useState([]);
      const [listening, setListening] = useState(false);
      const scrollRef = useRef(null);

      useEffect(() => {
        CHAT_MESSAGES.forEach((msg, i) => {
          setTimeout(() => {
            setVisible(prev => [...prev, i]);
            setTimeout(() => {
              if (scrollRef.current) {
                scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
              }
            }, 50);
          }, msg.delay + 200);
        });
      }, []);

      const contextLabel = {
        hook: 'WRITE A HOOK',
        debrief: 'DEBRIEF SESSION',
        ona: 'ONA PULSE',
        season: 'SEASON CHECK',
        anything: 'ANYTHING',
        history: 'PREVIOUS THREAD',
      }[context] || 'B-TWIST SPRINT';

      return (
        <div className="screen" style={{ display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div className="screen-header" style={{ paddingBottom: 8 }}>
            <button className="back-btn" onClick={onBack}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L5 8l5 5" stroke="#F5F5F7" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            <SmallOrb size={18} />
            <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, letterSpacing: '0.06em', color: '#F5F5F7' }}>JAM AI</span>
            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: '#B14CFF', letterSpacing: '0.08em', marginLeft: 'auto', background: 'rgba(177,76,255,0.12)', border: '1px solid rgba(177,76,255,0.25)', borderRadius: 6, padding: '3px 7px' }}>{contextLabel}</span>
          </div>

          {/* Chat scroll */}
          <div ref={scrollRef} className="screen-scroll" style={{ flex: 1 }}>
            <div className="chat-content" style={{ paddingTop: 78, paddingBottom: 8 }}>
              {CHAT_MESSAGES.map((msg, i) => {
                if (!visible.includes(i)) return null;

                if (msg.plan) {
                  return (
                    <div key={i} className="fade-up">
                      <div className="bubble-ai" style={{ marginBottom: 6 }}>
                        Here's your B-twist mastery sprint:
                      </div>
                      <div className="plan-card fade-up">
                        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', color: '#E9C46A', marginBottom: 10 }}>2-WEEK MASTERY SPRINT</div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                          {PLAN_STEPS.map(step => (
                            <div key={step.n} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                              <span style={{ fontFamily: "'Bebas Neue'", fontSize: 20, color: '#E9C46A', lineHeight: 1, minWidth: 24 }}>{step.n}</span>
                              <div>
                                <div style={{ fontSize: 12, fontWeight: 600, color: '#F5F5F7', marginBottom: 1 }}>{step.title}</div>
                                <div style={{ fontSize: 11, color: '#A7ADBA' }}>{step.desc}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                }

                if (msg.hooks) {
                  return (
                    <div key={i} className="fade-up" style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <div className="bubble-ai">{msg.content}</div>
                      {HOOKS.map((hook, hi) => (
                        <div key={hi} className="hook-card fade-up">
                          <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: '#45B7E8', lineHeight: 1.4 }}>{hook}</span>
                        </div>
                      ))}
                    </div>
                  );
                }

                return (
                  <div key={i} className={`${msg.role === 'ai' ? 'bubble-ai' : 'bubble-jay'} fade-up`}>
                    {msg.content}
                  </div>
                );
              })}
              <div style={{ height: 8 }} />
            </div>
          </div>

          {/* Input */}
          <div className="text-input-row">
            <input className="text-input" placeholder="Reply…" />
            <button
              className={`mic-btn${listening ? ' listening' : ''}`}
              onClick={() => setListening(l => !l)}
            >
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="4.5" y="1" width="5" height="7.5" rx="2.5" fill={listening ? '#FF6B5B' : '#A7ADBA'}/>
                <path d="M2 6.5C2 9.26 4.24 11.5 7 11.5s5-2.24 5-5" stroke={listening ? '#FF6B5B' : '#A7ADBA'} strokeWidth="1.3" strokeLinecap="round"/>
                <line x1="7" y1="11.5" x2="7" y2="13.5" stroke={listening ? '#FF6B5B' : '#A7ADBA'} strokeWidth="1.3" strokeLinecap="round"/>
                <line x1="4.5" y1="13.5" x2="9.5" y2="13.5" stroke={listening ? '#FF6B5B' : '#A7ADBA'} strokeWidth="1.3" strokeLinecap="round"/>
              </svg>
            </button>
            <button className="send-btn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    /* ── Root App ── */
    function App() {
      const [screen, setScreen] = useState(1);
      const [chatContext, setChatContext] = useState('btw');

      const navigate = (s, ctx) => {
        if (ctx) setChatContext(ctx);
        setScreen(s);
      };

      return (
        <div style={{ width: '100%', height: '100%', position: 'relative', background: '#06060A' }}>
          {/* Page ambient glow */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0,
            background: 'radial-gradient(ellipse 70% 50% at 50% 0%, rgba(177,76,255,0.10) 0%, transparent 70%)',
          }} />

          <div style={{ position: 'relative', zIndex: 1, width: '100%', height: '100%' }}>
            {screen === 1 && <Screen1 onNavigate={navigate} />}
            {screen === 2 && <Screen2 onBack={() => setScreen(1)} onChat={() => navigate(3, 'morning')} />}
            {screen === 3 && <Screen3 onBack={() => setScreen(screen === 3 && chatContext === 'morning' ? 2 : 1)} context={chatContext} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
