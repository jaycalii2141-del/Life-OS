<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C4 · Seasons — JAM HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="../node_modules/react/umd/react.development.js"></script>
  <script src="../node_modules/react-dom/umd/react-dom.development.js"></script>
  <script src="../node_modules/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0B0D;
      --text-primary: #F5F5F7;
      --text-secondary: #A7ADBA;
      --text-muted: #6B7280;
      --cyan: #45B7E8;
      --teal: #2DD4BF;
      --lime: #34D399;
      --gold: #E9C46A;
      --orange: #F4A261;
      --red: #FF6B5B;
      --violet: #B14CFF;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-inset: rgba(255,255,255,0.10);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
    }

    .page-nav {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .page-nav a:hover { color: var(--cyan); }

    .phone {
      width: 390px;
      min-height: 720px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .screen {
      width: 100%;
      min-height: 720px;
      padding: 48px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Typography */
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .display {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
      line-height: 1.0;
      color: var(--text-primary);
    }

    .body-sm {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Glass */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 var(--glass-inset);
      backdrop-filter: blur(20px);
      border-radius: 12px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    .btn-cyan { background: linear-gradient(135deg, var(--cyan), var(--teal)); }
    .btn-red  { background: linear-gradient(135deg, var(--red), var(--orange)); }
    .btn-violet { background: linear-gradient(135deg, var(--violet), #7B2FFF); }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--orange)); }

    /* ── SCREEN 1 — SETUP ── */
    .theme-tile {
      padding: 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 var(--glass-inset);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-left-width: 3px;
    }
    .theme-tile:hover { background: rgba(255,255,255,0.07); }
    .theme-tile.selected-red {
      background: rgba(255,107,91,0.10);
      border-color: var(--red);
      box-shadow: inset 0 1px 0 rgba(255,107,91,0.15), 0 0 20px rgba(255,107,91,0.15);
    }
    .theme-tile.selected-cyan {
      background: rgba(69,183,232,0.10);
      border-color: var(--cyan);
      box-shadow: inset 0 1px 0 rgba(69,183,232,0.15), 0 0 20px rgba(69,183,232,0.15);
    }
    .theme-tile.selected-violet {
      background: rgba(177,76,255,0.10);
      border-color: var(--violet);
      box-shadow: inset 0 1px 0 rgba(177,76,255,0.15), 0 0 20px rgba(177,76,255,0.15);
    }

    .theme-tile-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.06em;
    }

    .pact-card {
      padding: 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid rgba(233,196,106,0.35);
      box-shadow: inset 0 1px 0 rgba(233,196,106,0.10), 0 0 16px rgba(233,196,106,0.08);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .pact-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .pact-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
    }
    .pact-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ── SCREEN 2 — SEASON MAP ── */
    .season-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-red { background: rgba(255,107,91,0.20); color: var(--red); border: 1px solid rgba(255,107,91,0.30); }
    .badge-cyan { background: rgba(69,183,232,0.20); color: var(--cyan); border: 1px solid rgba(69,183,232,0.30); }

    .week-list {
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.10) transparent;
    }

    .week-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      min-height: 48px;
      transition: all 0.2s;
    }
    .week-row.done { opacity: 0.55; }
    .week-row.active {
      border-color: var(--cyan);
      box-shadow: 0 0 16px rgba(69,183,232,0.18), inset 0 1px 0 rgba(69,183,232,0.15);
      opacity: 1;
    }
    .week-row.locked { opacity: 0.35; }

    .week-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      width: 24px;
      flex-shrink: 0;
    }
    .week-icon { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
    .week-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .week-name.active-name { color: var(--text-primary); }
    .week-active-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.10em;
      color: var(--cyan);
      white-space: nowrap;
    }

    .week-bar-wrap {
      width: 40px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .week-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s;
    }
    .bar-lime { background: var(--lime); }
    .bar-cyan { background: var(--cyan); }
    .bar-dim  { background: rgba(255,255,255,0.12); }

    .progress-ring-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
    }
    .ring-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; }
    .ring-big { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--cyan); letter-spacing: 0.04em; }

    /* ── SCREEN 3 — CHAPTER ── */
    .progress-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--teal));
      transition: width 0.6s ease;
    }

    .theme-quote {
      padding: 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--red);
      box-shadow: inset 0 1px 0 var(--glass-inset);
    }
    .theme-quote p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
    }

    .focus-chips {
      display: flex;
      gap: 8px;
    }
    .focus-chip {
      flex: 1;
      padding: 10px 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
    }
    .chip-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chip-value { font-size: 11px; color: var(--text-secondary); }

    .log-textarea {
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 1.6;
      padding: 12px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .log-textarea:focus { border-color: var(--cyan); }

    .log-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: -8px;
    }

    .chapter-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }
    .back-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--cyan); }

    /* ── SCREEN 4 — FINALE ── */
    .finale-screen {
      position: relative;
      background: #05060a;
      overflow: hidden;
    }
    .finale-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(177,76,255,0.20) 0%, rgba(233,196,106,0.10) 40%, transparent 70%);
      pointer-events: none;
    }
    .finale-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--gold), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .achievement-card {
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--glass-bg);
      box-shadow: inset 0 1px 0 var(--glass-inset);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .achievement-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .ach-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .ach-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.04em;
      line-height: 1.0;
    }
    .ach-desc { font-size: 11px; color: var(--text-muted); }

    .ach-gold  { border: 1px solid rgba(233,196,106,0.40); box-shadow: 0 0 20px rgba(233,196,106,0.10), inset 0 1px 0 rgba(233,196,106,0.12); }
    .ach-lime  { border: 1px solid rgba(52,211,153,0.40);  box-shadow: 0 0 20px rgba(52,211,153,0.10),  inset 0 1px 0 rgba(52,211,153,0.12);  }
    .ach-cyan  { border: 1px solid rgba(69,183,232,0.40);  box-shadow: 0 0 20px rgba(69,183,232,0.10),  inset 0 1px 0 rgba(69,183,232,0.12);  }
    .ach-violet{ border: 1px solid rgba(177,76,255,0.40);  box-shadow: 0 0 20px rgba(177,76,255,0.10),  inset 0 1px 0 rgba(177,76,255,0.12);  }

    .ai-narration {
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
      min-height: 56px;
    }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 13px;
      background: var(--cyan);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .finale-btns { display: flex; flex-direction: column; gap: 8px; }

    /* Share overlay */
    .share-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,6,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
    }
    .share-card {
      width: 300px;
      background: #0D0E12;
      border: 1px solid rgba(233,196,106,0.30);
      border-radius: 20px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 0 60px rgba(233,196,106,0.12), 0 0 120px rgba(177,76,255,0.08);
    }
    .share-card-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .share-card-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.06em;
      text-align: center;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.0;
    }
    .share-card-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.10em;
      text-align: center;
    }
    .share-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .share-stat {
      text-align: center;
    }
    .share-stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--gold);
      letter-spacing: 0.04em;
      line-height: 1.0;
    }
    .share-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .share-close-btn {
      margin-top: 4px;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.10em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .share-close-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Responsive phone wrapper */
    @media (max-width: 440px) {
      .phone { width: 100%; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────── SCREEN 1: SETUP ─────────── */
    function SetupScreen({ onNext }) {
      const [selected, setSelected] = useState('red');

      const themes = [
        {
          id: 'red',
          name: 'THE FORGE',
          color: '#FF6B5B',
          desc: 'Athletic mastery. Body as weapon. Sessions as ritual.',
          selectedClass: 'selected-red',
        },
        {
          id: 'cyan',
          name: 'THE BUILD',
          color: '#45B7E8',
          desc: 'Create the system. Ship the product. Grow the audience.',
          selectedClass: 'selected-cyan',
        },
        {
          id: 'violet',
          name: 'THE ARC',
          color: '#B14CFF',
          desc: 'Life as art. Presence. Impact. Legacy.',
          selectedClass: 'selected-violet',
        },
      ];

      const btnClass = selected === 'red' ? 'btn-red' : selected === 'cyan' ? 'btn-cyan' : 'btn-violet';

      return (
        <div className="screen">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div className="eyebrow">12 WEEKS · 1 THEME · 1 FUTURE SELF</div>
            <div className="display" style={{ fontSize: 36 }}>BEGIN YOUR SEASON</div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {themes.map(t => (
              <div
                key={t.id}
                className={`theme-tile ${selected === t.id ? t.selectedClass : ''}`}
                style={{ borderLeftColor: t.color }}
                onClick={() => setSelected(t.id)}
              >
                <div className="theme-tile-title" style={{ color: t.color }}>{t.name}</div>
                <div className="body-sm">{t.desc}</div>
              </div>
            ))}
          </div>

          <div className="pact-card">
            <div className="pact-avatar">⚡</div>
            <div style={{ flex: 1 }}>
              <div className="pact-label">Future Self Pact</div>
              <div className="pact-text">
                "Show up Tuesdays. Ship Move Q3. Train through discomfort."
              </div>
            </div>
          </div>

          <button className={`btn ${btnClass}`} style={{ marginTop: 'auto' }} onClick={onNext}>
            BEGIN SEASON →
          </button>
        </div>
      );
    }

    /* ─────────── SCREEN 2: SEASON MAP ─────────── */
    const WEEKS = [
      { num: 1,  name: 'IGNITION',    status: 'done' },
      { num: 2,  name: 'FOUNDATION',  status: 'done' },
      { num: 3,  name: 'MOMENTUM',    status: 'done' },
      { num: 4,  name: 'PRESSURE',    status: 'done' },
      { num: 5,  name: 'THRESHOLD',   status: 'done' },
      { num: 6,  name: 'HEAT',        status: 'done' },
      { num: 7,  name: 'THE CRUCIBLE',status: 'active' },
      { num: 8,  name: '?',           status: 'locked' },
      { num: 9,  name: '?',           status: 'locked' },
      { num: 10, name: '?',           status: 'locked' },
      { num: 11, name: '?',           status: 'locked' },
      { num: 12, name: '?',           status: 'locked' },
    ];

    function SeasonMapScreen({ onNext, onBack }) {
      return (
        <div className="screen">
          <div className="season-header">
            <div className="display" style={{ fontSize: 28 }}>SEASON 3 · THE FORGE</div>
            <span className="badge badge-red">WEEK 7 OF 12</span>
          </div>

          <div className="week-list">
            {WEEKS.map(w => (
              <div
                key={w.num}
                className={`week-row ${w.status}`}
              >
                <div className="week-num">W{w.num}</div>
                <div className="week-icon">
                  {w.status === 'done'   && '✓'}
                  {w.status === 'active' && <span style={{ color: '#45B7E8' }}>●</span>}
                  {w.status === 'locked' && '🔒'}
                </div>
                <div className={`week-name ${w.status === 'active' ? 'active-name' : ''}`}>
                  {w.name}
                </div>
                {w.status === 'active' && (
                  <span className="week-active-badge">● CURRENT</span>
                )}
                <div className="week-bar-wrap">
                  <div
                    className={`week-bar-fill ${w.status === 'done' ? 'bar-lime' : w.status === 'active' ? 'bar-cyan' : 'bar-dim'}`}
                    style={{ width: w.status === 'done' ? '100%' : w.status === 'active' ? '43%' : '0%' }}
                  />
                </div>
              </div>
            ))}
          </div>

          <div className="progress-ring-wrap">
            <svg width="48" height="48" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="4"/>
              <circle
                cx="24" cy="24" r="20"
                fill="none"
                stroke="#45B7E8"
                strokeWidth="4"
                strokeDasharray={`${(7/12)*125.66} 125.66`}
                strokeLinecap="round"
                transform="rotate(-90 24 24)"
              />
            </svg>
            <div>
              <div className="ring-big">7 / 12</div>
              <div className="ring-label">5 WEEKS REMAINING</div>
            </div>
          </div>

          <button className="btn btn-cyan" onClick={onNext}>
            VIEW CURRENT CHAPTER →
          </button>
        </div>
      );
    }

    /* ─────────── SCREEN 3: CHAPTER ─────────── */
    function ChapterScreen({ onNext, onBack }) {
      const [logText, setLogText] = useState('Showed up at ONA 6am. B-twist felt locked in. +82% today.');

      return (
        <div className="screen">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div className="eyebrow">DAY 3 OF 7</div>
            <div className="display" style={{ fontSize: 26 }}>WEEK 7 · THE CRUCIBLE</div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span className="eyebrow" style={{ fontSize: 9 }}>CHAPTER PROGRESS</span>
              <span className="eyebrow" style={{ fontSize: 9, color: '#45B7E8' }}>43%</span>
            </div>
            <div className="progress-bar-wrap">
              <div className="progress-bar-fill" style={{ width: '43%' }} />
            </div>
          </div>

          <div className="theme-quote">
            <p>"This is where most people quit. This is where you don't."</p>
          </div>

          <div className="focus-chips">
            <div className="focus-chip">
              <div className="chip-label">
                <span className="dot" style={{ background: '#34D399' }} />
                <span style={{ color: '#34D399' }}>TRAIN</span>
              </div>
              <div className="chip-value">4 ninja sessions</div>
            </div>
            <div className="focus-chip">
              <div className="chip-label">
                <span className="dot" style={{ background: '#45B7E8' }} />
                <span style={{ color: '#45B7E8' }}>CREATE</span>
              </div>
              <div className="chip-value">2 JayMuvs posts</div>
            </div>
            <div className="focus-chip">
              <div className="chip-label">
                <span className="dot" style={{ background: '#FF6B5B' }} />
                <span style={{ color: '#FF6B5B' }}>BUILD</span>
              </div>
              <div className="chip-value">ONA Tuesday class</div>
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <div className="log-label">Chapter Log</div>
            <textarea
              className="log-textarea"
              rows={3}
              value={logText}
              onChange={e => setLogText(e.target.value)}
            />
          </div>

          <button className="btn btn-red" style={{ marginTop: 'auto' }} onClick={onNext}>
            SEAL THE CHAPTER ✓
          </button>

          <div className="chapter-footer">
            <span className="back-link" onClick={onBack}>← Season Map</span>
          </div>
        </div>
      );
    }

    /* ─────────── SCREEN 4: FINALE ─────────── */
    const ACHIEVEMENTS = [
      {
        colorClass: 'ach-gold',
        color: '#E9C46A',
        eyebrow: 'SESSIONS LOGGED',
        num: '47 of 48',
        desc: '98% completion',
        delay: 200,
      },
      {
        colorClass: 'ach-lime',
        color: '#34D399',
        eyebrow: 'SKILLS ADVANCED',
        num: 'B-twist: 68%→89%',
        desc: '+21 pts',
        delay: 600,
      },
      {
        colorClass: 'ach-cyan',
        color: '#45B7E8',
        eyebrow: 'CONTENT CREATED',
        num: '23 pieces',
        desc: '2.1M reach',
        delay: 1000,
      },
      {
        colorClass: 'ach-violet',
        color: '#B14CFF',
        eyebrow: 'LEVEL GAINED',
        num: 'LVL 14 → 18',
        desc: '+4 levels',
        delay: 1400,
      },
    ];

    const NARRATION = "You showed up 47 times when you didn't feel like it. That's who you became.";

    function FinaleScreen({ onNext }) {
      const [visible, setVisible] = useState([false, false, false, false]);
      const [typed, setTyped] = useState('');
      const [showShare, setShowShare] = useState(false);
      const typingRef = useRef(null);

      useEffect(() => {
        const timers = ACHIEVEMENTS.map((ach, i) =>
          setTimeout(() => {
            setVisible(v => {
              const next = [...v];
              next[i] = true;
              return next;
            });
          }, ach.delay)
        );

        // Start typing narration after all cards appear
        const narrationStart = 1400 + 400 + 300;
        const narrationTimer = setTimeout(() => {
          let idx = 0;
          typingRef.current = setInterval(() => {
            idx++;
            setTyped(NARRATION.slice(0, idx));
            if (idx >= NARRATION.length) clearInterval(typingRef.current);
          }, 40);
        }, narrationStart);

        return () => {
          timers.forEach(clearTimeout);
          clearTimeout(narrationTimer);
          if (typingRef.current) clearInterval(typingRef.current);
        };
      }, []);

      return (
        <div className="screen finale-screen" style={{ padding: 0 }}>
          <div className="finale-glow" />
          {showShare && (
            <div className="share-overlay">
              <div className="share-card">
                <div className="share-card-eyebrow">Becoming Artifact</div>
                <div className="share-card-headline">SEASON 3{'\n'}COMPLETE</div>
                <div className="share-card-sub">THE FORGE · JAM HQ</div>
                <div className="share-divider" />
                <div className="share-stat">
                  <div className="share-stat-num">47/48</div>
                  <div className="share-stat-label">Sessions</div>
                </div>
                <div style={{ display: 'flex', gap: 24 }}>
                  <div className="share-stat" style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: '#34D399', letterSpacing: '0.04em' }}>+21</div>
                    <div className="share-stat-label">Skill pts</div>
                  </div>
                  <div className="share-stat" style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: '#45B7E8', letterSpacing: '0.04em' }}>2.1M</div>
                    <div className="share-stat-label">Reach</div>
                  </div>
                  <div className="share-stat" style={{ textAlign: 'center' }}>
                    <div style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: '#B14CFF', letterSpacing: '0.04em' }}>+4</div>
                    <div className="share-stat-label">Levels</div>
                  </div>
                </div>
                <button className="share-close-btn" onClick={() => setShowShare(false)}>CLOSE PREVIEW</button>
              </div>
            </div>
          )}

          <div className="finale-content" style={{ padding: '48px 24px 32px' }}>
            <div>
              <div className="eyebrow" style={{ color: '#B14CFF', marginBottom: 6 }}>THE FORGE</div>
              <div className="display gradient-text" style={{ fontSize: 44 }}>SEASON 3{'\n'}COMPLETE</div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {ACHIEVEMENTS.map((ach, i) => (
                <div key={i} className={`achievement-card ${ach.colorClass} ${visible[i] ? 'visible' : ''}`}>
                  <div className="ach-eyebrow" style={{ color: ach.color }}>{ach.eyebrow}</div>
                  <div className="ach-num" style={{ color: ach.color }}>{ach.num}</div>
                  <div className="ach-desc">{ach.desc}</div>
                </div>
              ))}
            </div>

            <div className="ai-narration">
              {typed}
              {typed.length < NARRATION.length && <span className="cursor-blink" />}
            </div>

            <div className="finale-btns">
              <button className="btn btn-gold" onClick={() => setShowShare(true)}>
                SHARE SEASON
              </button>
              <button className="btn btn-violet" onClick={onNext}>
                BEGIN SEASON 4 →
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─────────── ROOT APP ─────────── */
    function App() {
      const [screen, setScreen] = useState(1);

      const advance = () => setScreen(s => Math.min(s + 1, 4));
      const back    = () => setScreen(s => Math.max(s - 1, 1));

      const screenLabels = ['SETUP', 'SEASON MAP', 'CHAPTER', 'FINALE'];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
          {/* Outside nav */}
          <div className="page-nav">
            <a href="../index.html">← INDEX</a>
            <span className="eyebrow" style={{ color: '#45B7E8', fontSize: 9 }}>
              C4 · SEASONS · {screenLabels[screen - 1]}
            </span>
            <a href="c3-weekly-review.html">← C3</a>
          </div>

          {/* Phone */}
          <div className="phone">
            {screen === 1 && <SetupScreen     onNext={advance} />}
            {screen === 2 && <SeasonMapScreen  onNext={advance} onBack={back} />}
            {screen === 3 && <ChapterScreen    onNext={advance} onBack={back} />}
            {screen === 4 && <FinaleScreen     onNext={() => setScreen(1)} />}
          </div>

          {/* Screen dots */}
          <div style={{ display: 'flex', gap: 8, marginTop: 20 }}>
            {[1,2,3,4].map(n => (
              <button
                key={n}
                onClick={() => setScreen(n)}
                style={{
                  width: n === screen ? 24 : 8,
                  height: 8,
                  borderRadius: 4,
                  border: 'none',
                  background: n === screen ? '#45B7E8' : 'rgba(255,255,255,0.15)',
                  cursor: 'pointer',
                  transition: 'all 0.3s',
                  padding: 0,
                }}
              />
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
