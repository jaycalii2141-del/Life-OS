<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LIFE OS — Fable Design Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ───────────────────────────── LIFE OS · DESIGN TOKENS ───────────────────────────── */
:root{
  --bg0:#06060A; --bg1:#0B0B12; --bg2:#11111A;
  --text:#F5F5F7; --muted:#8A8A95; --dim:#5A5A66;
  --line:rgba(255,255,255,.06); --line2:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.035);
  --cyan:#00D4FF; --violet:#B14CFF; --magenta:#FF3CC8; --lime:#B6FF3C;
  --gold:#FFD23C; --red:#FF0033; --orange:#FF8A3C; --blue:#0055FF;
  --fd:'Bebas Neue',sans-serif; --fb:'Inter',-apple-system,system-ui,sans-serif; --fm:'JetBrains Mono',Menlo,monospace;
  --ease:cubic-bezier(.2,.7,.2,1); --spring:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
*::-webkit-scrollbar{display:none} *{scrollbar-width:none}
html,body{margin:0;height:100%;background:#000;color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 800px 600px at 18% 8%,rgba(0,85,255,.07) 0%,transparent 60%),
             radial-gradient(ellipse 700px 540px at 82% 92%,rgba(177,76,255,.06) 0%,transparent 60%),#000}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:48px 48px;
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 30%,transparent 80%);
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 30%,transparent 80%)}

/* ── Device frame ── */
.device{position:relative;width:393px;height:852px;background:var(--bg0);border-radius:54px;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 10px #0a0a0e,0 0 0 11px rgba(255,255,255,.07),0 50px 120px -20px rgba(0,0,0,.9),0 0 140px -40px rgba(0,212,255,.18)}
@media(max-width:480px),(max-height:900px){.device{width:100vw;height:100dvh;border-radius:0;border:none;box-shadow:none}}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;border-radius:20px;background:#000;z-index:90;border:1px solid rgba(255,255,255,.05)}
.statusbar{position:absolute;top:0;left:0;right:0;height:54px;z-index:80;display:flex;align-items:center;justify-content:space-between;padding:14px 30px 0;
  font-family:var(--fm);font-size:12.5px;font-weight:600;letter-spacing:.04em;pointer-events:none}
.statusbar .sigs{display:flex;gap:6px;align-items:center}
.batt{width:22px;height:11px;border:1px solid rgba(255,255,255,.5);border-radius:3px;position:relative}
.batt::after{content:'';position:absolute;inset:1.5px;right:5px;background:var(--lime);border-radius:1px}

/* ── Screen scroller ── */
.scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:74px 0 150px;-webkit-overflow-scrolling:touch}
.content{padding:0 16px;display:flex;flex-direction:column;gap:14px}
.content>*{animation:cardIn 520ms var(--ease) both}
.content>*:nth-child(1){animation-delay:30ms}.content>*:nth-child(2){animation-delay:80ms}
.content>*:nth-child(3){animation-delay:130ms}.content>*:nth-child(4){animation-delay:180ms}
.content>*:nth-child(5){animation-delay:230ms}.content>*:nth-child(6){animation-delay:280ms}
.content>*:nth-child(7){animation-delay:330ms}.content>*:nth-child(n+8){animation-delay:370ms}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── Type ── */
.display{font-family:var(--fd);letter-spacing:.03em;line-height:.95}
.mono{font-family:var(--fm)}
.eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);font-weight:500}
.h-screen{font-family:var(--fd);font-size:34px;letter-spacing:.03em;line-height:.95}
.sec-title{font-family:var(--fd);font-size:21px;letter-spacing:.05em;color:var(--text)}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px -4px}

/* ── Glass + HUD ticks ── */
.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--line);border-radius:18px;position:relative}
.glass-strong{background:rgba(255,255,255,.05);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--line2);border-radius:22px;position:relative}
.tk{position:absolute;width:9px;height:9px;border:0 solid rgba(255,255,255,.28);pointer-events:none;z-index:2}
.tk.tl{top:7px;left:7px;border-top-width:1px;border-left-width:1px}
.tk.tr{top:7px;right:7px;border-top-width:1px;border-right-width:1px}
.tk.bl{bottom:7px;left:7px;border-bottom-width:1px;border-left-width:1px}
.tk.br{bottom:7px;right:7px;border-bottom-width:1px;border-right-width:1px}

/* ── Mesh heroes ── */
.mesh-today{background:radial-gradient(ellipse 70% 80% at 12% 18%,rgba(0,212,255,.17) 0%,transparent 55%),radial-gradient(ellipse 60% 70% at 92% 8%,rgba(177,76,255,.15) 0%,transparent 55%),radial-gradient(ellipse 80% 70% at 50% 105%,rgba(255,0,51,.10) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}
.mesh-train{background:radial-gradient(ellipse 65% 70% at 82% 14%,rgba(0,212,255,.20) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 14% 92%,rgba(182,255,60,.10) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}
.mesh-create{background:radial-gradient(ellipse 60% 70% at 16% 16%,rgba(255,60,200,.17) 0%,transparent 55%),radial-gradient(ellipse 70% 70% at 92% 100%,rgba(255,138,60,.14) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}
.mesh-ona{background:radial-gradient(ellipse 70% 70% at 8% 0%,rgba(255,0,51,.20) 0%,transparent 55%),radial-gradient(ellipse 70% 70% at 100% 100%,rgba(182,255,60,.09) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}
.mesh-mind{background:radial-gradient(ellipse 70% 70% at 85% 10%,rgba(0,212,255,.16) 0%,transparent 55%),radial-gradient(ellipse 60% 80% at 10% 95%,rgba(177,76,255,.14) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}
.mesh-ai{background:radial-gradient(ellipse 70% 70% at 50% 0%,rgba(177,76,255,.28) 0%,transparent 55%),radial-gradient(ellipse 70% 70% at 50% 105%,rgba(0,212,255,.18) 0%,transparent 55%),linear-gradient(140deg,#0B0B12,#11111A)}

/* ── Pills / chips ── */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font-family:var(--fm);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--text);white-space:nowrap}
.pdot{width:6px;height:6px;border-radius:99px;background:currentColor;box-shadow:0 0 8px currentColor}
.chip{display:inline-flex;align-items:center;gap:7px;padding:9px 13px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid var(--line2);background:rgba(255,255,255,.045);color:var(--text);cursor:pointer;white-space:nowrap}
.chip.done{color:var(--lime);border-color:rgba(182,255,60,.4);background:rgba(182,255,60,.08)}

/* ── Press ── */
.pr{transition:transform 170ms var(--ease),box-shadow 170ms var(--ease),border-color 170ms,background 170ms;cursor:pointer;user-select:none;touch-action:manipulation}
.pr:active{transform:scale(.96)}

/* ── Bars ── */
.bar{height:4px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;position:relative;flex:1}
.bar>i{display:block;height:100%;border-radius:99px;background:var(--cyan);position:relative;transition:width 900ms var(--ease)}
.bar>i::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:translateX(-100%);animation:shine 2.6s ease-in-out infinite}
@keyframes shine{to{transform:translateX(100%)}}

/* ── Tracker chip: TRACK → WORKING → GOT IT ── */
.trk{font-family:var(--fm);font-size:8.5px;font-weight:700;letter-spacing:.13em;padding:5px 10px;border-radius:99px;border:1px solid var(--line2);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer;white-space:nowrap;transition:all 180ms var(--ease)}
.trk.w{color:var(--gold);border-color:rgba(255,210,60,.45);background:rgba(255,210,60,.09);box-shadow:0 0 14px -5px rgba(255,210,60,.6)}
.trk.g{color:var(--lime);border-color:rgba(182,255,60,.5);background:rgba(182,255,60,.1);box-shadow:0 0 14px -4px rgba(182,255,60,.7)}

/* ── Drill cards ── */
.drill{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025);padding:11px 12px;display:flex;flex-direction:column;gap:8px}
.drill .num{font-family:var(--fd);font-size:17px;color:var(--dim);min-width:18px;line-height:1.1}
.callout{display:flex;gap:8px;padding:8px 10px;border-radius:10px;font-size:11px;line-height:1.45}
.callout b{font-family:var(--fm);font-size:8px;letter-spacing:.16em;display:block;margin-bottom:2px;font-weight:700}
.fault{background:rgba(255,0,51,.07);border:1px solid rgba(255,0,51,.22);color:#ffb3c2}
.fault b{color:var(--red)}
.gate{background:rgba(182,255,60,.06);border:1px solid rgba(182,255,60,.22);color:#dcffb0}
.gate b{color:var(--lime)}

/* ── Skill tree rows ── */
.tier-block{border-left:2px solid;padding-left:12px;margin-left:5px;display:flex;flex-direction:column;gap:8px}
.skill-row{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.025)}
.skill-row.open{border-color:var(--line2);background:rgba(255,255,255,.045)}
.sdot{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--fm);font-size:8px;font-weight:700}

/* ── Tab bar ── */
.tabbar{position:absolute;left:12px;right:12px;bottom:14px;z-index:70;height:64px;border-radius:24px;display:flex;align-items:stretch;padding:0 6px;
  background:rgba(10,10,16,.78);backdrop-filter:blur(28px) saturate(170%);-webkit-backdrop-filter:blur(28px) saturate(170%);
  border:1px solid var(--line2);box-shadow:0 18px 50px rgba(0,0,0,.7)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--dim);position:relative;border-radius:18px;transition:color 200ms}
.tab span{font-family:var(--fm);font-size:7.5px;letter-spacing:.18em;font-weight:600}
.tab.on{color:var(--text)}
.tab.on::before{content:'';position:absolute;top:7px;width:18px;height:2px;border-radius:2px;background:var(--acc,var(--cyan));box-shadow:0 0 10px var(--acc,var(--cyan))}
.tab .badge{position:absolute;top:8px;right:50%;margin-right:-20px;min-width:15px;height:15px;border-radius:8px;background:var(--gold);color:#06060A;font-family:var(--fm);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 0 12px rgba(255,210,60,.5)}

/* ── FAB + Companion launcher ── */
.fab{position:absolute;right:18px;bottom:94px;z-index:60;width:54px;height:54px;border-radius:19px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--cyan),#0090cc);color:#04222e;border:1px solid rgba(255,255,255,.25);
  animation:fabGlow 2.6s ease-out infinite}
@keyframes fabGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.35),0 8px 26px rgba(0,212,255,.35)}50%{box-shadow:0 0 0 9px rgba(0,212,255,0),0 8px 26px rgba(0,212,255,.5)}}
.orb-launch{position:absolute;left:18px;bottom:94px;z-index:60;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#0B0B12;border:1px solid rgba(255,255,255,.14);box-shadow:0 10px 30px -6px rgba(177,76,255,.55)}

/* ── Orb (conic, spinning) ── */
.orb{position:relative;flex-shrink:0}
.orb .r1{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,var(--cyan),var(--violet),var(--magenta),var(--gold),var(--cyan));
  -webkit-mask:radial-gradient(circle,transparent 58%,#000 60%,#000 75%,transparent 77%);mask:radial-gradient(circle,transparent 58%,#000 60%,#000 75%,transparent 77%);
  animation:spin 11s linear infinite}
.orb .r2{position:absolute;inset:14%;border-radius:50%;background:conic-gradient(from 90deg,transparent 0deg,var(--cyan) 35deg,transparent 70deg,transparent 200deg,var(--violet) 235deg,transparent 270deg);
  -webkit-mask:radial-gradient(circle,transparent 48%,#000 50%,#000 92%,transparent 94%);mask:radial-gradient(circle,transparent 48%,#000 50%,#000 92%,transparent 94%);
  animation:spinR 6.5s linear infinite}
.orb .core{position:absolute;inset:31%;border-radius:50%;background:radial-gradient(circle at 31% 30%,#fff 0%,var(--cyan) 32%,var(--violet) 72%,#06060A 100%);
  box-shadow:0 0 26px rgba(0,212,255,.6),inset 0 0 12px rgba(255,255,255,.4);animation:corePulse 2.4s ease-in-out infinite}
.orb .halo{position:absolute;inset:-22%;border-radius:50%;background:radial-gradient(circle,rgba(177,76,255,.35) 0%,transparent 62%);filter:blur(6px)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
@keyframes corePulse{0%,100%{box-shadow:0 0 22px rgba(0,212,255,.55),inset 0 0 12px rgba(255,255,255,.4)}50%{box-shadow:0 0 38px rgba(0,212,255,.85),inset 0 0 14px rgba(255,255,255,.6)}}

/* ── Sheets ── */
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:150;animation:fadeIn 240ms ease}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:160;background:var(--bg1);border-top:1px solid var(--line2);border-radius:30px 30px 0 0;
  padding:12px 18px calc(env(safe-area-inset-bottom,0px) + 26px);max-height:88%;overflow-y:auto;
  animation:sheetIn 420ms var(--spring);box-shadow:0 -24px 70px rgba(0,0,0,.65)}
.sheet.tall{height:88%}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.closing .sheet{animation:sheetOut 260ms cubic-bezier(.4,0,1,1) forwards}
.closing.scrim,.closing .scrim{animation:fadeOut 240ms ease forwards}
@keyframes sheetOut{to{transform:translateY(104%)}}
@keyframes fadeOut{to{opacity:0}}
.grab{width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,.22);margin:2px auto 14px}

/* ── Segmented ── */
.seg{display:flex;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:4px}
.seg>div{flex:1;text-align:center;padding:8px 0;border-radius:9px;font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--muted);cursor:pointer;transition:all 180ms}
.seg>div.on{background:rgba(0,212,255,.14);color:var(--cyan);border:1px solid rgba(0,212,255,.35);box-shadow:0 0 16px -6px rgba(0,212,255,.6)}

/* ── Skeleton ── */
.skel{position:relative;overflow:hidden;background:rgba(255,255,255,.05);border-radius:8px}
.skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);animation:skl 1.3s ease-in-out infinite}
@keyframes skl{to{transform:translateX(100%)}}

/* ── Confetti / toast ── */
#fx{position:absolute;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.cf{position:absolute;width:7px;height:13px;border-radius:2px;animation:burst 1150ms var(--ease) forwards}
@keyframes burst{0%{transform:translate(-50%,-50%) rotate(0) scale(.6);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot)) scale(1);opacity:0}}
.toast{position:absolute;left:50%;top:18%;transform:translateX(-50%);z-index:320;padding:12px 22px;border-radius:16px;background:rgba(10,12,18,.92);border:1px solid rgba(182,255,60,.45);
  font-family:var(--fm);font-size:11px;letter-spacing:.3em;color:var(--lime);box-shadow:0 0 40px -8px rgba(182,255,60,.5);animation:toastIn 260ms var(--spring),fadeOut 300ms ease 1300ms forwards}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px) scale(.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}

/* ── Boot splash ── */
.boot{position:absolute;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  background:radial-gradient(120% 80% at 50% 38%,#12121C 0%,#06060A 64%)}
.boot.leaving{animation:bootOut 520ms cubic-bezier(.4,0,1,1) forwards}
@keyframes bootOut{to{opacity:0;transform:scale(1.07);filter:blur(3px)}}
.boot .orb{width:104px;height:104px;animation:orbIn 950ms var(--spring) both}
@keyframes orbIn{0%{opacity:0;transform:scale(.45)}60%{opacity:1;transform:scale(1.09)}100%{transform:scale(1)}}
.boot-word{font-family:var(--fd);font-size:50px;line-height:1;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--magenta));-webkit-background-clip:text;background-clip:text;color:transparent;animation:word 1050ms var(--spring) 340ms both}
@keyframes word{0%{opacity:0;letter-spacing:.55em;transform:translateY(8px)}100%{opacity:1;letter-spacing:.07em;transform:none}}
.boot-tag{font-size:12px;color:var(--muted);text-align:center;max-width:250px;line-height:1.55;animation:rise 800ms ease 820ms both}
.boot-ver{position:absolute;bottom:46px;font-family:var(--fm);font-size:9px;letter-spacing:.3em;color:var(--dim);animation:rise 800ms ease 1100ms both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:.95;transform:none}}

/* ── Onboarding ── */
.onb{position:absolute;inset:0;z-index:380;display:flex;flex-direction:column;justify-content:flex-end;padding:0 22px 40px;
  background:radial-gradient(110% 70% at 50% 0%,#13131f 0%,#06060A 60%)}
.onb .hero{position:absolute;top:11%;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:18px}
.onb-card{display:flex;gap:13px;align-items:center;padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.035);animation:cardIn 520ms var(--ease) both}
.onb .cta{margin-top:18px;padding:17px;border-radius:18px;text-align:center;font-family:var(--fd);font-size:21px;letter-spacing:.12em;color:#06121a;
  background:linear-gradient(90deg,var(--cyan),var(--violet));box-shadow:0 14px 44px -10px rgba(0,212,255,.5);animation:cardIn 520ms var(--ease) .55s both}

/* ── Misc ── */
.blink{animation:blnk 1.5s ease-in-out infinite}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:.25}}
.pulse{animation:pls 2.2s ease-out infinite}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(255,0,51,.5)}50%{box-shadow:0 0 0 7px rgba(255,0,51,0)}}
.heat{width:100%;aspect-ratio:1;border-radius:5px}
.dashed{border:1.5px dashed rgba(255,255,255,.14);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;color:var(--dim);font-size:12px;font-weight:500}
.bubble-u{align-self:flex-end;max-width:84%;padding:9px 13px;border-radius:15px 15px 4px 15px;background:linear-gradient(135deg,rgba(0,212,255,.16),rgba(177,76,255,.18));border:1px solid rgba(177,76,255,.3);font-size:13px;line-height:1.45}
.bubble-a{align-self:flex-start;max-width:92%;padding:10px 13px;border-radius:15px 15px 15px 4px;background:rgba(255,255,255,.045);border:1px solid var(--line);font-size:13px;line-height:1.5;white-space:pre-wrap}
.acts{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
input,textarea{font-family:var(--fb);color:var(--text)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="device" id="device">
  <div class="island"></div>
  <div class="statusbar"><div>9:41</div><div class="sigs"><svg width="17" height="11" viewBox="0 0 17 11" fill="rgba(255,255,255,.85)"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></svg><div class="batt"></div></div></div>

tricking:[

 {n:'The block — speed into height',why:'The block redirects horizontal momentum into vertical lift via a stiff leg planted ~45° in front. It\'s the lever that gives running tricks their air.',how:'Round-off block, hurdle-step block, depth-jump stiffness, single-leg blocking off a run.',std:'Convert a run into a high vertical jump off one stiff leg.'},

/* ════════════════ FX ════════════════ */
function confetti(n=26){const fx=$('fx'),cols=['#00D4FF','#B14CFF','#FF3CC8','#B6FF3C','#FFD23C'];
 for(let i=0;i<n;i++){const p=document.createElement('div');p.className='cf';
  const a=Math.random()*Math.PI*2,d=70+Math.random()*150;
  p.style.left='50%';p.style.top='42%';p.style.background=cols[i%5];
  p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',(Math.sin(a)*d-60)+'px');
  p.style.setProperty('--rot',(Math.random()*640-320)+'deg');fx.appendChild(p);setTimeout(()=>p.remove(),1250)}hapt(24)}
function toast(msg,color){const t=document.createElement('div');t.className='toast';if(color){t.style.borderColor=color+'66';t.style.color=color;t.style.boxShadow=`0 0 40px -8px ${color}55`}t.textContent=msg;$('device').appendChild(t);setTimeout(()=>t.remove(),1750)}

function ring(p){const C=2*Math.PI*46;return `<div style="position:relative;width:118px;height:118px;flex-shrink:0">
<svg width="118" height="118" viewBox="0 0 118 118"><defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00D4FF"/><stop offset="1" stop-color="#B14CFF"/></linearGradient></defs>
<circle cx="59" cy="59" r="46" stroke="rgba(255,255,255,.07)" stroke-width="8" fill="none"/>
<circle cx="59" cy="59" r="46" stroke="url(#rg)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${(C*p/100).toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 59 59)" style="filter:drop-shadow(0 0 9px rgba(0,212,255,.55))"/></svg>
<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
<div class="display" style="font-size:40px">${p}</div><div class="eyebrow" style="font-size:7.5px">READINESS</div></div></div>`}
function radarSVG(){const cx=86,cy=86,R=64,N=6;const pt=(i,v)=>{const a=(-90+i*60)*Math.PI/180,r=R*v/100;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`};
 let grid='';[33,66,100].forEach(g=>{grid+=`<polygon points="${RADAR.axes.map((_,i)=>pt(i,g)).join(' ')}" fill="none" stroke="rgba(255,255,255,.06)"/>`});
 let ax='';RADAR.axes.forEach((a,i)=>{const ang=(-90+i*60)*Math.PI/180,lx=cx+(R+13)*Math.cos(ang),ly=cy+(R+13)*Math.sin(ang);
  ax+=`<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(ang)}" y2="${cy+R*Math.sin(ang)}" stroke="rgba(255,255,255,.07)"/>
  <text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono" font-size="7" letter-spacing="1" fill="#8A8A95">${a.slice(0,3).toUpperCase()}</text>`});
 return `<svg width="172" height="172" viewBox="0 0 172 172">${grid}${ax}
 <polygon points="${RADAR.goal.map((v,i)=>pt(i,v)).join(' ')}" fill="none" stroke="rgba(255,255,255,.22)" stroke-dasharray="3 4"/>
 <polygon points="${RADAR.cur.map((v,i)=>pt(i,v)).join(' ')}" fill="rgba(0,212,255,.15)" stroke="#00D4FF" stroke-width="1.6" style="filter:drop-shadow(0 0 6px rgba(0,212,255,.5))"/>
 ${RADAR.cur.map((v,i)=>`<circle cx="${pt(i,v).split(',')[0]}" cy="${pt(i,v).split(',')[1]}" r="2.4" fill="#00D4FF"/>`).join('')}</svg>`}
function trkChip(key){const v=S.trk[key]||0,cls=v===1?'w':v===2?'g':'',lbl=v===1?'WORKING':v===2?'✓ GOT IT':'TRACK';
 return `<span class="trk pr ${cls}" onclick="event.stopPropagation();App.cycleTrk(this,'${key}')">${lbl}</span>`}

 <div style="display:flex;gap:8px;margin-top:10px">

function compReply(q){const t=q.toLowerCase();
 if(/cork|gainer|btwist|twist|trick/.test(t))return {t:'Your cork is gated behind the gainer — it\'s sitting at 55%. The pattern in your notes: you\'re jumping backward instead of traveling forward off the one leg.\n\nThis week: 3 short gainer blocks off elevation, film every rep, and keep drilling the swing-through entry. When the gainer lands on flat, the cork opens up.',acts:[{k:'session',t:'Log session'},{k:'capture',t:'Save to Movement'}]};
 if(/focus|today|plan|day/.test(t))return {t:'Readiness 84 — green light. The one thing is the B-twist tutorial: it feeds JayMuvs AND the league launch.\n\nProtect 16:00 for the shoot, batch the 3 fault-fix overlays right after, and let Riley carry the 13:00 review agenda.',acts:[{k:'event',t:'Block 16:00 — shoot'},{k:'focus',t:'Set focus'}]};
 if(/neglect|missing|blind|gap/.test(t))return {t:'Two things, honestly:\n\n1 · Acro — active skills, but no session in 3 weeks. Chelsea\'s schedule shows Thursday 19:00 free.\n2 · Landing & eccentric work — the most-skipped pillar and your longevity insurance.\n\nOne acro block + 10 min of depth landings fixes both.',acts:[{k:'event',t:'Plan acro block'},{k:'session',t:'Log session'}]};
 if(/podium|order|build/.test(t))return {t:'Frame it as one question: does this order move revenue this month?\n\nThe 14ft warped-wall panels do — the cliffhanger ledge set can wait for hardware. Quote the panels at the new rate, protect a CNC block Friday, and tell the client a real date.',acts:[{k:'email',t:'Draft client email'},{k:'capture',t:'Save decision'}]};
 return {t:'Here\'s your snapshot:\nReadiness 84/100 · streak day 12\nOne Thing → B-twist tutorial\n'+S.inbox.length+' thoughts to triage · 2 P0 initiatives at ONA\n\nAsk me to plan your day, coach a skill, or think through a decision.',acts:[{k:'event',t:'Block deep work'}]}}

function shSession(){const d=DISC.find(x=>x.id===S.sess.disc);const ph=S.sess.phase;
 let body='';
 if(ph==='pick'){body=`
  <div class="eyebrow" style="margin:2px 0 8px">FOCUS DISCIPLINE</div>
  <div style="display:flex;gap:7px;flex-wrap:wrap">${DISC.map(x=>`<span class="chip pr" onclick="App.sessDisc('${x.id}')" style="${x.id===S.sess.disc?`color:${x.c};border-color:${x.c}66;background:${x.c}12`:''}">${x.ic} ${x.name}</span>`).join('')}</div>
  <div class="eyebrow" style="margin:15px 0 8px">DURATION</div>
  <div class="seg">${[45,60,90].map(m=>`<div class="${S.sess.dur===m?'on':''}" onclick="App.sessDur(${m})">${m} MIN</div>`).join('')}</div>
  <div class="glass" style="padding:13px;margin-top:15px;border-color:rgba(255,210,60,.22)">${T}
   <div class="eyebrow" style="color:var(--gold);margin-bottom:10px">⚠ BLINDSPOTS YOUR COACH IS WATCHING</div>
   ${BLINDSPOTS.map(b=>`<div style="display:flex;gap:9px;margin-bottom:10px"><span style="width:7px;height:7px;border-radius:99px;background:${b.c};box-shadow:0 0 8px ${b.c};margin-top:4px;flex-shrink:0"></span>
    <div><div style="font-size:11.5px;font-weight:700">${b.t}</div><div style="font-size:10.5px;color:var(--muted);line-height:1.5;margin-top:2px">${b.d}</div></div></div>`).join('')}</div>
  <div class="pr" onclick="App.genSession()" style="margin-top:14px;padding:15px;border-radius:15px;text-align:center;background:linear-gradient(90deg,var(--cyan),var(--violet));color:#06121a"><span class="display" style="font-size:18px;letter-spacing:.1em">GENERATE SESSION</span></div>`}
 else if(ph==='loading'){body=`<div class="eyebrow" style="margin:6px 0 12px;color:var(--cyan)">COACH IS READING YOUR TREE, LAST 21 DAYS & READINESS…</div>
  ${[64,90,78,52].map(h=>`<div class="skel" style="height:${h}px;margin-bottom:10px"></div>`).join('')}`}
 else{const top=SKILLS[S.sess.disc].find(s=>s.st==='active')||SKILLS[S.sess.disc][0];
  const dr=(DRILLS[S.sess.disc][top.t]||[]).slice(0,3);
  const phase=(label,c,items)=>`<div style="border-left:2px solid ${c};padding:2px 0 2px 12px;margin:0 0 12px">
   <div class="mono" style="font-size:9px;letter-spacing:.18em;color:${c};margin-bottom:6px">${label}</div>
   ${items.map(x=>`<div style="font-size:12px;line-height:1.55;color:var(--text)">· ${x}</div>`).join('')}</div>`;
  body=`<div class="pill" style="color:${d.c};border-color:${d.c}55;margin-bottom:12px">${d.ic} ${d.name.toUpperCase()} · ${S.sess.dur} MIN · READINESS 84 — PUSH DAY</div>
  ${phase('PREP · 10 MIN','#00D4FF',['Wrist & shoulder prep — CARs, scap push-ups, dislocates','Body-line: 30s hollow + 30s arch, 2 rounds','Ankle dorsiflexion + light pogos'])}
  ${phase('PRIMARY — '+top.n.toUpperCase()+' · 25 MIN','#B6FF3C',dr.map(x=>x.n+' — gate: '+x.gate))}
  ${phase('SUPPORTING STRENGTH · 15 MIN','#FFD23C',['Planche lean 4×15s + front-lever pulls 4×5','Nordic curls 3×5 — landing insurance','Pull/push balance: weighted pull-ups 3×6'])}
  ${phase('COOL-DOWN · 10 MIN','#B14CFF',['Depth landings — stick & absorb, 2×5 quiet reps','Thoracic + hip mobility flow, breathwork 2 min'])}
  ${S.sess.phase==='logged'
   ?`<div style="padding:14px;border-radius:15px;text-align:center;border:1px solid rgba(182,255,60,.5);background:rgba(182,255,60,.1);color:var(--lime)"><span class="display" style="font-size:18px;letter-spacing:.1em">✓ SESSION LOGGED</span></div>`
   :`<div class="pr" onclick="App.logSession()" style="padding:15px;border-radius:15px;text-align:center;background:linear-gradient(90deg,var(--lime),#7acc1e);color:#0c1404"><span class="display" style="font-size:18px;letter-spacing:.1em">LOG THIS SESSION</span></div>`}`}
 return `<div class="eyebrow" style="color:var(--cyan)">AI COACH · STRUCTURED BY YOUR SKILL TREE</div>
 <div class="display" style="font-size:26px;margin:5px 0 12px">BUILD MY SESSION</div>${body}`}

function shWeek(){const rows=WEEK.slice(0,S.week.days).concat([WEEK[6]]);
 return `<div class="eyebrow" style="color:var(--violet)">PERIODIZATION · MICROCYCLE</div>
 <div class="display" style="font-size:26px;margin:5px 0 12px">PLAN WEEK</div>
 <div class="eyebrow" style="margin-bottom:8px">TRAINING DAYS / WEEK</div>
 <div class="seg">${[3,4,5,6].map(n=>`<div class="${S.week.days===n?'on':''}" onclick="App.weekDays(${n})">${n}</div>`).join('')}</div>
 <div class="eyebrow" style="margin:14px 0 8px">PRIORITY</div>
 <div style="display:flex;gap:7px;flex-wrap:wrap">${DISC.map(x=>`<span class="chip pr" onclick="App.weekPrio('${x.id}')" style="${x.id===S.week.prio?`color:${x.c};border-color:${x.c}66;background:${x.c}12`:''}">${x.ic} ${x.name}</span>`).join('')}</div>
 <div style="display:flex;flex-direction:column;gap:8px;margin-top:15px">
 ${rows.map(w=>{const m=IMP_META[w.imp];return `<div style="display:flex;gap:11px;align-items:center;padding:11px 12px;border-radius:13px;border:1px solid ${m.c}26;background:${m.c}0a">

  <div style="flex:1"><div class="mono" style="font-size:9.5px;font-weight:700;letter-spacing:.08em">${w.d.toUpperCase()}</div>
  <div style="font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4">${w.f}</div></div>
  <span class="pill" style="color:${m.c};border-color:${m.c}45;font-size:7px">${m.l}</span></div>`}).join('')}</div>
 <div class="eyebrow" style="margin:15px 0 8px;color:var(--violet)">WHY THIS WORKS</div>
 ${PRINCIPLES.map(p=>`<div style="display:flex;gap:8px;font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:7px"><span style="color:var(--violet)">▸</span>${p}</div>`).join('')}
 <div class="pr" onclick="App.applyWeek()" style="margin-top:12px;padding:15px;border-radius:15px;text-align:center;background:linear-gradient(90deg,var(--violet),var(--magenta));color:#160620"><span class="display" style="font-size:18px;letter-spacing:.1em">APPLY TO CALENDAR</span></div>`}

function shReview(){return `<div class="eyebrow" style="color:var(--cyan)">WEEKLY REVIEW · JUN 6 – 12</div>
 <div class="display" style="font-size:26px;margin:5px 0 14px">HOW THE WEEK ACTUALLY WENT</div>
 <div style="display:flex;gap:9px;margin-bottom:16px">
  ${[['6/7','DAYS ACTIVE','#B6FF3C'],['81','AVG READINESS','#00D4FF'],['5','SESSIONS','#FFD23C']].map(s=>`<div class="glass" style="flex:1;padding:12px;text-align:center">${T}<div class="display" style="font-size:25px;color:${s[2]}">${s[0]}</div><div class="eyebrow" style="font-size:7px;margin-top:3px">${s[1]}</div></div>`).join('')}</div>
 <div class="glass" style="padding:14px;margin-bottom:14px">${T}
  <div class="eyebrow" style="color:var(--cyan);margin-bottom:12px">WHERE YOUR ATTENTION ACTUALLY WENT</div>
  ${ATTENTION.map(a=>`<div class="att" style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
   <span style="font-size:12px;width:16px">${a.e}</span><span style="font-size:10.5px;font-weight:600;width:56px">${a.n}</span>
   <div class="bar" style="height:7px"><i data-w="${a.pct*2.4}%" style="width:0;background:${a.c};box-shadow:0 0 10px ${a.c}55"></i></div>
   <span class="mono" style="font-size:9.5px;color:${a.c};width:30px;text-align:right">${a.pct}%</span></div>`).join('')}
  <div style="font-size:10.5px;color:var(--muted);line-height:1.5;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)">ONA ate a third of your week while <b style="color:var(--violet)">Wife & I</b> and <b style="color:var(--cyan)">Self</b> got 15% combined. The league launch explains it — just don't let it become the pattern.</div></div>

 <div class="acts" style="margin-top:10px">

/* ════════════════ APP ACTIONS ════════════════ */
window.App={
 go(t){S.tab=t;hapt(8);render()},
 toggleDisc(id){S.openDisc=S.openDisc===id?null:id;hapt(8);render(true)},
 toggleSkill(k){S.skillKey=S.skillKey===k?null:k;hapt(8);render(true)},
 cycleTrk(el,key){const v=((S.trk[key]||0)+1)%3;S.trk[key]=v;hapt(10);
  el.className='trk pr '+(v===1?'w':v===2?'g':'');el.textContent=v===1?'WORKING':v===2?'✓ GOT IT':'TRACK';
  if(v===2){confetti(20);toast('LOCKED IN','#B6FF3C')}},
 oneThing(){S.oneDone=!S.oneDone;if(S.oneDone){confetti();toast('ONE THING — DONE','#B6FF3C')}render(true)},
 briefChip(el,msg){el.classList.add('done');el.innerHTML=I('check',13)+' Done';toast(msg.toUpperCase(),'#00D4FF');hapt()},
 route(i,arch){S.inbox.splice(i,1);hapt(12);toast(arch?'ARCHIVED':'ROUTED','#B6FF3C');if(!S.inbox.length){setTimeout(()=>confetti(30),250)}render(true)},
 upgrade(yes){S.upg=yes?'accepted':'dismissed';if(yes){confetti(22);toast('QUEUED FOR V4','#B14CFF')}render(true)},
 pickAgent(id){S.agent=id;hapt(8);render(true)},
 agentAsk(q){const a=AGENTS.find(x=>x.id===S.agent);S.achat.push({u:1,t:q});S.thinking=true;render(true);
  setTimeout(()=>{S.thinking=false;S.achat.push({a:a.name,c:a.c,t:AGENT_REPLIES[q]||'On it.'});render(true)},650)},
 agentFree(){const el=$('agentIn');const q=(el&&el.value.trim());if(!q)return;el.value='';
  const a=AGENTS.find(x=>x.id===S.agent);S.achat.push({u:1,t:q});S.thinking=true;render(true);
  setTimeout(()=>{S.thinking=false;S.achat.push({a:a.name,c:a.c,t:AGENT_REPLIES[a.quick[0]]});render(true)},700)},
 openSheet(name){S.sheet=name;if(name==='session'&&S.sess.phase==='logged')S.sess.phase='pick';hapt(8);paintSheet()},
 closeSheet(){S.sheet=null;const h=$('sheetHost');h.classList.add('closing');
  h.querySelectorAll('.scrim,.sheet').forEach(e=>e.classList.add('closing'));
  setTimeout(()=>{h.classList.remove('closing');if(S.sheet===null)h.innerHTML=''},260)},
 capTag(id){const t=$('capText');if(t)S.capDraft=t.value;S.capTag=id;paintSheet()},
 capture(){const txt=($('capText')&&$('capText').value.trim())||S.capDraft||'Reel idea: fundamentals carousel — the set, the block, the twist';
  const d=DOMAINS.find(x=>x.id===S.capTag);S.inbox.unshift({text:txt,tag:S.capTag,meta:'JUST NOW · TYPED'});
  S.capDraft='';this.closeSheet();confetti(16);toast('CAPTURED','#00D4FF');tabbar();if(S.tab==='mind')render(true)},
 compStart(i){this.compSend(STARTERS[i])},
 compSend(text){const el=$('compIn');const q=(text!=null?text:(el?el.value.trim():''));if(!q||S.compThink)return;if(el)el.value='';
  S.comp.push({u:1,t:q});S.compThink=true;paintSheet();
  setTimeout(()=>{S.compThink=false;S.comp.push(Object.assign({u:0},compReply(q)));paintSheet()},750)},
 compAct(mi,ai){const a=S.comp[mi].acts[ai];if(a.done)return;a.done=true;hapt(14);
  if(a.k==='session'){confetti();toast('SESSION LOGGED','#B6FF3C')}
  else if(a.k==='event')toast('ADDED TO TODAY · 16:00','#00D4FF');
  else if(a.k==='capture')toast('SAVED','#FFD23C');
  else if(a.k==='focus')toast('FOCUS SET','#FF0033');
  else toast('DRAFT READY','#B14CFF');paintSheet()},
 sessDisc(id){S.sess.disc=id;paintSheet()},
 sessDur(m){S.sess.dur=m;paintSheet()},
 genSession(){S.sess.phase='loading';paintSheet();setTimeout(()=>{S.sess.phase='plan';paintSheet();hapt()},1050)},
 logSession(){S.sess.phase='logged';confetti();toast('SESSION LOGGED','#B6FF3C');paintSheet()},
 weekDays(n){S.week.days=n;paintSheet()},
 weekPrio(id){S.week.prio=id;paintSheet()},
 applyWeek(){this.closeSheet();confetti(20);toast('MICROCYCLE → CALENDAR','#B14CFF')},
 schedFocus(t){toast('BLOCKED · '+t.toUpperCase(),'#00D4FF');hapt()},
 setFocus(){this.closeSheet();confetti();toast('WEEK CLOSED — FOCUS SET','#B6FF3C')},
 dismissOnb(){const o=$('onb');if(!o)return;o.style.transition='opacity 420ms ease, transform 420ms ease';o.style.opacity=0;o.style.transform='scale(1.04)';hapt(16);setTimeout(()=>o.remove(),430)}
};

boot();
